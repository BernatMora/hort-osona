<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg:        #F5EBD8;
    --c-bg-2:      #EFE3CB;
    --c-paper:     #FBF5E6;
    --c-ink:       #2B2418;
    --c-ink-2:     #5A4F3A;
    --c-line:      #D8C8A5;
    --c-line-2:    #C4B189;
    --c-olive:     #3D4A2A;
    --c-leaf:      #5C7A3A;
    --c-ochre:     #A8783E;
    --c-mud:       #6B4F2A;
    --c-accent-bg: #E8D9B0;
    --c-red:       #8C3A1A;
    --shadow:      0 1px 0 rgba(60,40,15,0.05), 0 2px 6px rgba(60,40,15,0.05);
    --radius:      6px;
    --sidebar-w:   290px;
    --header-h:    64px;
    --reading-max: 760px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--c-bg); color: var(--c-ink); }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  a:hover { color: var(--c-mud); border-bottom-color: var(--c-ochre); }

  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

  .sidebar {
    background: var(--c-bg-2);
    border-right: 1px solid var(--c-line);

    height: 100vh; overflow-y: auto;

  }
  .brand {

  .doc h1, .doc h2, .doc h3, .doc h4, .doc h5 {

  .welcome {

    margin: 0 auto;

  .welcome-card {

    display: flex; align-items: center; gap: 10px;

    border: 1px solid var(--c-line);

  .cat-card .nm { font-weight: 600; font-size: 14.5px; color: var(--c-olive); flex: 1; }

  .hl { background: #F2D88A; color: var(--c-ink); padding: 0 2px; border-radius: 2px; }

  /* ───── Giny de checklist del mes ───── */

    display: grid; grid-template-columns: 1fr 1fr;

  .lunar-cell {

    background: var(--c-paper);

  /* ───── Pàgina completa de checklist ───── */
  .checklist-page { max-width: var(--reading-max); margin: 0 auto; padding: 36px 32px 96px; }
  .checklist-page-inner {
    background: var(--c-paper);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 36px 44px 44px;

  }
  .checklist-page h1 {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--c-olive);
    font-size: 32px; font-weight: 600;
    margin: 0 0 8px;

    border-bottom: 2px solid var(--c-ochre);
  }
  .clima-note {
    background: var(--c-accent-bg);
    border-left: 3px solid var(--c-ochre);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 14px 0 24px;
    color: var(--c-ink-2);

    line-height: 1.55;
  }
  .checklist-section { margin: 28px 0 18px; }
  .checklist-section h2 {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--c-olive);
    font-size: 20px;
    margin: 0 0 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--c-line);
  }
  .lunar-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
  .lunar-table th, .lunar-table td { border: 1px solid var(--c-line); padding: 8px 10px; text-align: left; vertical-align: top; }
  .lunar-table th { background: var(--c-bg-2); color: var(--c-olive); font-weight: 600; }
  .task-list { list-style: none; padding: 0; margin: 8px 0; }
  .task-list li { margin: 6px 0; }

  .task-list input[type="checkbox"] { margin-top: 3px; transform: scale(1.1); accent-color: var(--c-leaf); }

  .task-list .desc { color: var(--c-ink-2); font-size: 13px; display: block; margin-top: 2px; }

  .dates-clau h3 { font-family: 'Fraunces', Georgia, serif; color: var(--c-olive); margin: 0 0 8px; font-size: 17px; }

  .prompt-box {

    padding: 16px 20px; border-radius: var(--radius);

    .sidebar { position: relative; height: auto; max-height: 60vh; }

<body>
<div class="app">

  <aside class="sidebar" aria-label="Navegació">
    <h1 class="brand"><span class="leaf">🌱</span> Hort Osona</h1>
    <p class="brand-sub">Base de coneixement · Osona</p>
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input id="search" class="search" type="search" placeholder="Cerca per títol o text…" autocomplete="off" spellcheck="false">
    </div>
    <ul class="nav" id="nav"></ul>
    <div class="sidebar-foot">
      Generat el __DATE__<br>
      __TOTAL__ documents · __NCAT__ categories<br>
      <a href="build.py" style="border-bottom:0;color:var(--c-ochre)">build.py</a> regenera el lloc
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="crumbs" id="crumbs">
        <a href="#" data-home>🌱 Hort Osona</a>
      </div>
      <div class="topbar-meta" id="topbar-meta">__TOTAL__ documents</div>
    </div>
    <div id="view" class="welcome"></div>
  </main>

</div>

<script>
(() => {
  const DOCS = __DOCS__;
  const SIDEBAR = __SIDEBAR__;
  const TOTAL = __TOTAL__;
  const CHECKLIST = __CHECKLIST__;

  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  const debounce = (fn, ms=120) => {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  };

  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);

  const escapeRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

  function readHash() {
    const m = location.hash.match(/[#&]doc=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function readCatHash() {
    const m = location.hash.match(/[#&]cat=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function isChecklistHash() {
    return /[#&]checklist(?:&|$)/.test(location.hash);
  }
  function writeHash(id) {
    const newHash = '#doc=' + encodeURIComponent(id);
    if (location.hash !== newHash) {
      history.replaceState(null, '', newHash);
    }
  }

  const INDEX = DOCS.map(d => ({
    id: d.id,
    title: d.title,
    summary: d.summary,
    category: d.category,
    path: d.path,
    hay: (d.title + ' ' + d.summary + ' ' + d.path).toLowerCase()
  }));

  function searchDocs(q) {
    q = q.trim().toLowerCase();
    if (!q) return null;
    const tokens = q.split(/\s+/).filter(Boolean);
    return INDEX
      .map(d => {
        const hay = d.hay;
        const all = tokens.every(t => hay.includes(t));
        return all ? d : null;
      })
      .filter(Boolean);
  }

  function highlightText(text, tokens) {
    if (!tokens.length) return escapeHtml(text);
    const pattern = new RegExp('(' + tokens.map(escapeRe).join('|') + ')', 'gi');
    return escapeHtml(text).replace(pattern, '<mark class="hl">$1</mark>');
  }

  function renderDoc(id) {
    const doc = DOCS.find(d => d.id === id);
    if (!doc) { renderWelcome(); return; }

    writeHash(id);
    document.title = doc.title + ' · Hort Osona';

    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<span>' + escapeHtml(doc.category) + '</span>' +
      '<span class="sep">›</span>' +
      '<span>' + escapeHtml(doc.title) + '</span>';

    const view = $('#view');
    view.className = 'reader';
    view.innerHTML =
      '<div class="reader-inner">' +
        '<div class="doc-meta">' +
          '<span class="pill">' + escapeHtml(doc.category) + '</span>' +
          '<span>' + escapeHtml(doc.path) + '</span>' +
        '</div>' +
        '<article class="doc">' + doc.html + '</article>' +
      '</div>';

    $$('.nav-item').forEach(a => a.classList.toggle('active', a.dataset.id === id));
    const cat = $('.nav-cat-btn[data-cat="' + CSS.escape(doc.category) + '"]');
    if (cat) cat.parentElement.classList.remove('collapsed');
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function renderWelcome() {
    document.title = 'Hort Osona · Base de coneixement';
    $('#crumbs').innerHTML = '<a href="#" data-home>🌱 Hort Osona</a>';
    const view = $('#view');
    view.className = 'welcome';
    let widgetHtml = '';
    if (CHECKLIST) {
      const mesCapital = CHECKLIST.mes_ca.charAt(0).toUpperCase() + CHECKLIST.mes_ca.slice(1);
      // Determinar setmana actual (la que conté avui)
      const avui = new Date();
      const avuiIso = avui.toISOString().slice(0,10);
      const setmanaActual = CHECKLIST.setmanes.find(s => s.inici <= avuiIso && s.fi >= avuiIso) || CHECKLIST.setmanes[0];
      // Top tasca: la primera amb prio >= 4
      const top = CHECKLIST.tasques.find(t => t.prio >= 4) || CHECKLIST.tasques[0];
      const prioStr = top.prio >= 5 ? '🔴 Urgent' : (top.prio >= 4 ? '🟠 Important' : '🟡 Recomanat');
      // Strip de les 4 primeres setmanes
      const stripCells = CHECKLIST.setmanes.slice(0, 4).map(s => {
        const dt = s.inici.slice(8,10) + '/' + s.inici.slice(5,7);
        return '<div class="lunar-cell"><span class="em">' + s.fase.emoji + '</span><span class="dt">' + dt + '</span></div>';
      }).join('');
      widgetHtml =
        '<div class="month-widget">' +
          '<div class="month-card">' +
            '<h3>📅 ' + mesCapital + ' ' + CHECKLIST.year + '</h3>' +
            '<div style="font-size:13.5px;color:var(--c-ink-2)">' +
              setmanaActual.fase.emoji + ' ' + escapeHtml(setmanaActual.fase.etiqueta) + ' — ' + escapeHtml(setmanaActual.fase.desc) +
            '</div>' +
            '<div class="top-task" style="margin-top:12px">' +
              '<span class="prio" style="font-size:11px;color:var(--c-ink-2)">' + prioStr + '</span><br>' +
              '<strong>' + escapeHtml(top.titol) + '</strong>' +
              '<small>' + escapeHtml(top.desc) + '</small>' +
            '</div>' +
          '</div>' +
          '<div class="month-card">' +
            '<h3>🌙 Calendari lunar</h3>' +
            '<div style="font-size:12.5px;color:var(--c-ink-2);margin-bottom:4px">4 setmanes del mes</div>' +
            '<div class="lunar-strip">' + stripCells + '</div>' +
            '<a class="open-checklist" href="#checklist">Obrir checklist completa →</a>' +
          '</div>' +
        '</div>';
    }
    view.innerHTML =
      '<div class="welcome-card">' +
        '<h1><span class="leaf">🌱</span> Hort Osona</h1>' +
        '<p class="lede">Base de coneixement personal d\'hort ecològic, plantes medicinals, bolets i conserves, ' +
        'adaptat a la comarca d\'<strong>Osona</strong> (Catalunya central). ' +
        'Tria una categoria o comença a cercar a dalt a l\'esquerra.</p>' +
        widgetHtml +
        '<div class="stats">' +
          '<div class="stat"><div class="stat-n">' + TOTAL + '</div><div class="stat-l">Documents</div></div>' +
          '<div class="stat"><div class="stat-n">' + SIDEBAR.length + '</div><div class="stat-l">Categories</div></div>' +
          '<div class="stat"><div class="stat-n">2026</div><div class="stat-l">Temporada</div></div>' +
        '</div>' +
        '<div class="cat-grid" id="cat-grid"></div>' +
      '</div>';
    const grid = $('#cat-grid');
    SIDEBAR.forEach(s => {
      const a = document.createElement('a');
      a.className = 'cat-card';
      a.href = '#cat=' + encodeURIComponent(s.name);
      a.dataset.cat = s.name;
      a.setAttribute('role', 'button');
      a.innerHTML =
        '<span class="em">' + s.emoji + '</span>' +
        '<span class="nm">' + escapeHtml(s.name) + '</span>' +
        '<span class="ct">' + s.count + '</span>';
      a.addEventListener('click', e => {
        e.preventDefault();
        // Neteja hash + cerca, després enfoca la categoria al sidebar
        if (location.hash) history.replaceState(null, '', location.pathname + location.search);
        $('#search').value = '';
        focusCategory(s.name);
      });
      grid.appendChild(a);
    });
  }

  function renderChecklist() {
    if (!CHECKLIST) { renderWelcome(); return; }
    const mesCapital = CHECKLIST.mes_ca.charAt(0).toUpperCase() + CHECKLIST.mes_ca.slice(1);
    document.title = 'Checklist ' + mesCapital + ' ' + CHECKLIST.year + ' · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<span>Checklist ' + escapeHtml(mesCapital) + ' ' + CHECKLIST.year + '</span>';

    // Construeix el calendari lunar com a taula
    let lunarRows = '';
    for (const s of CHECKLIST.setmanes) {
      lunarRows +=
        '<tr><td><strong>Setmana ' + s.n + '</strong></td>' +
        '<td>' + s.inici.slice(8,10) + '/' + s.inici.slice(5,7) + ' – ' + s.fi.slice(8,10) + '/' + s.fi.slice(5,7) + '</td>' +
        '<td>' + s.fase.emoji + ' ' + escapeHtml(s.fase.etiqueta) + '</td>' +
        '<td>' + escapeHtml(s.fase.desc) + '</td></tr>';
    }

    // Tasques agrupades per categoria
    const perCat = {};
    for (const t of CHECKLIST.tasques) {
      (perCat[t.cat] = perCat[t.cat] || []).push(t);
    }
    const ordreCat = [
      ['sembra', '🌱 Sembra'],
      ['trasplantament', '🌿 Trasplantament'],
      ['conreu', '🛠️ Conreu'],
      ['tractaments', '🐞 Tractaments'],
      ['collita', '🧺 Collita'],
      ['planificacio', '📋 Planificació'],
      ['observacio', '👀 Observació'],
    ];
    let taskSections = '';
    for (const [key, titol] of ordreCat) {
      if (!perCat[key]) continue;
      const prioEmoji = p => p >= 5 ? '🔴' : (p >= 4 ? '🟠' : '🟡');
      const items = perCat[key].map(t =>
        '<li data-prio="' + t.prio + '"><label>' +
          '<input type="checkbox" data-task="' + escapeHtml(t.titol) + '">' +
          '<span><span class="prio">' + prioEmoji(t.prio) + '</span> <strong>' + escapeHtml(t.titol) + '</strong>' +
          '<small class="desc">' + escapeHtml(t.desc) + '</small></span>' +
        '</label></li>'
      ).join('');
      taskSections +=
        '<div class="checklist-section"><h2>' + titol + '</h2>' +
        '<ul class="task-list">' + items + '</ul></div>';
    }

    // Dates clau
    let datesHtml = '';
    if (CHECKLIST.dates_clau && CHECKLIST.dates_clau.length) {
      datesHtml = '<div class="dates-clau"><h3>📌 Dates clau a Osona</h3><ul>';
      for (const d of CHECKLIST.dates_clau) {
        datesHtml += '<li><strong>' + escapeHtml(d.etiqueta) + '</strong> — ' + escapeHtml(d.data) + '</li>';
      }
      datesHtml += '</ul></div>';
    }

    const climaHtml = '<div class="clima-note">' + escapeHtml(CHECKLIST.clima_nota).replace(/\n/g, '<br>') + '</div>';

    // Genera el prompt per copiar
    let promptText = '# Hort Osona — ' + mesCapital + ' ' + CHECKLIST.year + '\n\n';
    promptText += 'Estem a ' + mesCapital + ' de ' + CHECKLIST.year + '. ' + CHECKLIST.clima_nota.replace(/\n/g, ' ') + '\n\n';
    promptText += '## Tasques prioritàries\n\n';
    for (const t of CHECKLIST.tasques) {
      const p = t.prio >= 5 ? 'URGENT' : (t.prio >= 4 ? 'IMPORTANT' : 'Recomanat');
      promptText += '- [' + p + '] ' + t.titol + ' — ' + t.desc + '\n';
    }
    promptText += '\n## Calendari lunar\n\n';
    for (const s of CHECKLIST.setmanes) {
      promptText += '- Setmana ' + s.n + ' (' + s.inici + ' al ' + s.fi + '): ' + s.fase.etiqueta + ' — ' + s.fase.desc + '\n';
    }

    const view = $('#view');
    view.className = 'checklist-page';
    view.innerHTML =
      '<div class="checklist-page-inner">' +
        '<h1>📅 Checklist ' + escapeHtml(mesCapital) + ' ' + CHECKLIST.year + '</h1>' +
        climaHtml +
        '<div class="checklist-section">' +
          '<h2>🌙 Calendari lunar</h2>' +
          '<table class="lunar-table"><thead><tr><th>Setmana</th><th>Dates</th><th>Fase</th><th>Recomanació</th></tr></thead><tbody>' +
          lunarRows +
          '</tbody></table>' +
        '</div>' +
        taskSections +
        datesHtml +
        '<div class="checklist-section">' +
          '<h2>🤖 Prompt per Open WebUI</h2>' +
          '<p style="color:var(--c-ink-2);font-size:14px;margin:0 0 8px">Copia aquest prompt i enganxa\'l com a system prompt a Open WebUI per tenir el context complet del mes.</p>' +
          '<button class="copy-btn" id="copy-prompt">📋 Copiar prompt</button>' +
          '<pre class="prompt-box" id="prompt-box">' + escapeHtml(promptText) + '</pre>' +
        '</div>' +
      '</div>';

    // Handler per copiar
    const btn = $('#copy-prompt');
    if (btn) {
      btn.addEventListener('click', () => {
        const text = $('#prompt-box').textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = '✅ Copiat!';
          setTimeout(() => btn.textContent = '📋 Copiar prompt', 2000);
        });
      });
    }

    // Persistència dels checkboxes (localStorage)
    $$('.task-list input[type="checkbox"]').forEach(cb => {
      const key = 'checklist-' + CHECKLIST.year + '-' + CHECKLIST.month + '-' + cb.dataset.task;
      if (localStorage.getItem(key) === '1') {
        cb.checked = true;
        cb.parentElement.parentElement.classList.add('done');
      }
      cb.addEventListener('change', () => {
        if (cb.checked) {
          localStorage.setItem(key, '1');
          cb.parentElement.parentElement.classList.add('done');
        } else {
          localStorage.removeItem(key);
          cb.parentElement.parentElement.classList.remove('done');
        }
      });
    });
  }

  function focusCategory(name) {
    // 1) Tanca totes les categories i obre la que toca
    $$('.nav-cat').forEach(li => li.classList.add('collapsed'));
    const btn = $('.nav-cat-btn[data-cat="' + CSS.escape(name) + '"]');
    if (!btn) return;
    const li = btn.parentElement;
    li.classList.remove('collapsed');

    // 2) Neteja qualsevol "active" previ
    $$('.nav-item').forEach(a => a.classList.remove('active'));

    // 3) Marca visualment la categoria (no pas un document concret)
    $$('.nav-cat-btn').forEach(b => b.classList.remove('cat-focused'));
    btn.classList.add('cat-focused');

    // 4) Actualitza breadcrumb perquè sàpiga on és
    document.title = name + ' · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<span>' + escapeHtml(name) + '</span>';

    // 5) Scroll suau del sidebar fins al botó
    btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function renderSearchResults(q, tokens) {
    const results = searchDocs(q);
    document.title = (results ? results.length : 0) + ' resultats · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<span>Cerca: &ldquo;' + escapeHtml(q) + '&rdquo;</span>';
    const view = $('#view');
    view.className = 'welcome';
    if (!results || !results.length) {
      view.innerHTML =
        '<div class="welcome-card no-results">' +
          '<span class="em">🔍</span>' +
          '<h2 style="font-family:Fraunces,serif;color:var(--c-olive);margin:0 0 8px">Cap resultat</h2>' +
          '<p>Res per a &ldquo;<strong>' + escapeHtml(q) + '</strong>&rdquo;. Prova amb un altre terme.</p>' +
        '</div>';
      return;
    }
    let html = '<div class="welcome-card">';
    html += '<h1 style="font-size:26px;margin:0 0 6px">Resultats de cerca</h1>';
    html += '<p class="lede" style="margin-bottom:18px">' + results.length + ' documents coincideixen amb &ldquo;' + escapeHtml(q) + '&rdquo;.</p>';
    html += '<ul class="nav-items" style="padding-left:0;display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    for (const r of results) {
      html +=
        '<li><a class="nav-item" href="#doc=' + encodeURIComponent(r.id) + '">' +
          '<strong>' + highlightText(r.title, tokens) + '</strong><br>' +
          '<span style="font-size:12px">' + highlightText(r.summary || r.path, tokens) + '</span>' +
        '</a></li>';
    }
    html += '</ul></div>';
    view.innerHTML = html;
  }

  function renderSidebar() {
    const nav = $('#nav');
    nav.innerHTML = '';
    SIDEBAR.forEach(s => {
      const docsInCat = DOCS.filter(d => d.category === s.name);
      const li = document.createElement('li');
      li.className = 'nav-cat';
      const btn = document.createElement('button');
      btn.className = 'nav-cat-btn';
      btn.dataset.cat = s.name;
      btn.innerHTML =
        '<span class="em">' + s.emoji + '</span>' +
        '<span>' + escapeHtml(s.name) + '</span>' +
        '<span class="ct">' + s.count + '</span>';
      btn.addEventListener('click', () => li.classList.toggle('collapsed'));
      li.appendChild(btn);

      const ul = document.createElement('ul');
      ul.className = 'nav-items';
      docsInCat.forEach(d => {
        const a = document.createElement('a');
        a.className = 'nav-item';
        a.href = '#doc=' + encodeURIComponent(d.id);
        a.dataset.id = d.id;
        a.textContent = d.title;
        ul.appendChild(a);
      });
      li.appendChild(ul);
      nav.appendChild(li);
    });
  }

  function route() {
    const q = $('#search').value;
    if (q.trim()) { renderSearchResults(q, q.trim().toLowerCase().split(/\s+/)); return; }
    const id = readHash();
    if (id) { renderDoc(id); return; }
    const cat = readCatHash();
    if (cat) {
      renderWelcome();
      // Petit timeout perquè el sidebar s'hagi renderitzat
      setTimeout(() => focusCategory(cat), 0);
      return;
    }
    if (isChecklistHash()) { renderChecklist(); return; }
    renderWelcome();
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderSidebar();
    route();

    const onInput = debounce(route, 100);
    $('#search').addEventListener('input', e => onInput(e.target.value));
    $('#search').addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.target.value = ''; route(); }
    });

    document.addEventListener('click', e => {
      const t = e.target.closest('[data-home]');
      if (t) { e.preventDefault(); location.hash = ''; $('#search').value = ''; renderWelcome(); }
    });

    window.addEventListener('hashchange', route);
  });
})();
</script>
</body>
</html>
