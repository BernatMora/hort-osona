  function route() {
    const q = $('#search').value;
    if (q.trim()) { renderSearchResults(q, q.trim().toLowerCase().split(/\s+/)); return; }
    const id = readHash();
    if (id) { renderDoc(id); return; }
    const cat = readCatHash();
    if (cat) {
      renderWelcome();
      // Petit timeout perquè el sidebar s'hagi renderitzat
      setTimeout(() => focusCategory(cat), 0);
      return;
    }
    if (isChecklistHash()) { renderChecklist(); return; }
    if (isQuadernHash()) { renderQuadern(); return; }
    if (isRotacionsHash()) { renderRotacions(); return; }
    if (isDatesHash()) { renderDates(); return; }
    if (isStatsHash()) { renderStats(); return; }
    if (isFontsHash()) { renderFonts(); return; }
    if (isSensorsHash()) { renderSensors(); return; }
    if (isCalendariHash()) { renderCalendariQuadern(); return; }
    renderWelcome();
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderSidebar();
    route();

    const onInput = debounce(route, 100);
    $('#search').addEventListener('input', e => onInput(e.target.value));
    $('#search').addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.target.value = ''; route(); }
    });

    document.addEventListener('click', e => {
      const t = e.target.closest('[data-home]');
      if (t) { e.preventDefault(); location.hash = ''; $('#search').value = ''; renderWelcome(); }
    });

    window.addEventListener('hashchange', route);
  });

  // ───── Pàgina #sensors — dades IoT reals del backend Raspberry ─────
  const SENSORS_KEY = 'hort-osona-sensors-url';
  function getSensorsUrl() {
    return localStorage.getItem(SENSORS_KEY) || 'http://hortpi.local:8000';
  }
  function setSensorsUrl(url) {
    localStorage.setItem(SENSORS_KEY, url);
  }

  async function fetchSensors() {
    const base = getSensorsUrl();
    try {
      const r = await fetch(base + '/sensors', { signal: AbortSignal.timeout(5000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch (e) {
      throw new Error('Connexió: ' + e.message);
    }
  }

  async function fetchSensorHistory(parcela, hours) {
    const base = getSensorsUrl();
    try {
      const r = await fetch(base + '/sensors/' + encodeURIComponent(parcela) + '/history?hours=' + hours,
                            { signal: AbortSignal.timeout(10000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch (e) {
      return [];
    }
  }

  function renderSensorValue(sensor) {
    const data = JSON.parse(sensor.data_json || '{}');
    const isMiflora = sensor.sensor_type === 'miflora';
    const isThermo = sensor.sensor_type === 'thermometer';

    let html = '';
    if (isMiflora) {
      const moisture = data.moisture;
      const moisturePct = Math.max(0, Math.min(100, moisture || 0));
      const moistureLow = moisture < 30;
      html += '<div class="metric">';
      html += '<span class="k">Humitat sòl</span>';
      html += '<span><span class="v" style="color:' + (moistureLow ? '#C0392B' : 'inherit') + '">' + (moisture || '—') + '</span><span class="u">%</span></span>';
      html += '</div>';
      html += '<div class="bar ' + (moistureLow ? 'bar-h-low' : 'bar-h') + '"><div style="width:' + moisturePct + '%"></div></div>';
      if (data.temperature != null) {
        html += '<div class="metric"><span class="k">Temp. sòl</span><span><span class="v">' + data.temperature.toFixed(1) + '</span><span class="u">°C</span></span></div>';
      }
      if (data.light != null) {
        const lightPct = Math.min(100, (data.light / 60000) * 100);
        html += '<div class="metric"><span class="k">Llum</span><span><span class="v">' + data.light.toLocaleString() + '</span><span class="u">lux</span></span></div>';
        html += '<div class="bar bar-l"><div style="width:' + lightPct + '%"></div></div>';
      }
      if (data.conductivity != null) {
        html += '<div class="metric"><span class="k">Conduc.</span><span><span class="v">' + data.conductivity + '</span><span class="u">µS/cm</span></span></div>';
      }
    } else if (isThermo) {
      if (data.temperature != null) {
        html += '<div class="metric"><span class="k">Temp. aire</span><span><span class="v">' + data.temperature.toFixed(1) + '</span><span class="u">°C</span></span></div>';
      }
      if (data.humidity != null) {
        html += '<div class="metric"><span class="k">Humitat</span><span><span class="v">' + data.humidity + '</span><span class="u">%</span></span></div>';
      }
    } else {
      html += '<div class="metric"><span class="k">Dades</span><span class="v" style="font-size:12px">' + escapeHtml(JSON.stringify(data)) + '</span></div>';
    }
    if (data.battery != null) {
      html += '<div class="metric"><span class="k">Bateria</span><span><span class="v">' + data.battery + '</span><span class="u">%</span></span></div>';
    }
    return html;
  }

  function renderSensors() {
    document.title = 'Sensors IoT · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      'Sensors IoT';
    const view = $('#view');
    view.className = 'checklist-page';
    view.innerHTML =
      '<div class="checklist-page-inner">' +
        '<h1>📡 Sensors IoT</h1>' +
        '<p style="color:var(--c-ink-2);font-size:14px;margin:0 0 14px">Dades en temps real dels sensors Xiaomi MiFlora i LoRa 868MHz. Refresca cada 60 segons.</p>' +
        '<div class="sensors-config">' +
          '<label>URL backend:</label>' +
          '<input id="sensors-url" type="text" placeholder="http://hortpi.local:8000" />' +
          '<button id="sensors-save">Desar</button>' +
        '</div>' +
        '<div id="sensors-status" class="sensors-status"><span>⏳ Connectant...</span></div>' +
        '<div id="sensors-grid" class="sensors-grid"></div>' +
        '<div id="sensors-charts"></div>' +
      '</div>';

    // Handler per desar URL
    $('#sensors-save').addEventListener('click', () => {
      const url = $('#sensors-url').value.trim();
      if (url) {
        setSensorsUrl(url);
        loadSensorsData();
      }
    });
    $('#sensors-url').value = getSensorsUrl();

    // Dibuixa una gràfica SVG (sense llibreries externes)
    function drawSensorChart(parcela) {
      fetchSensorHistory(parcela, 24).then(hist => {
        if (hist.length < 2) return;
        const points = hist.map(h => {
          const d = JSON.parse(h.data_json || '{}');
          return { ts: new Date(h.ts).getTime(), m: d.moisture };
        }).filter(p => p.m != null);
        if (points.length < 2) return;
        const canvas = document.getElementById('chart-' + parcela.replace(/[^a-z0-9]/gi, '_'));
        if (!canvas) return;
        const W = canvas.clientWidth, H = 180;
        const pad = 30;
        const xMin = points[0].ts, xMax = points[points.length - 1].ts;
        const yMin = 0, yMax = 100;
        const xR = xMax - xMin || 1;
        const yR = yMax - yMin || 1;
        const xS = t => pad + ((t - xMin) / xR) * (W - 2*pad);
        const yS = v => H - pad - ((v - yMin) / yR) * (H - 2*pad);
        const path = points.map((p, i) => (i ? 'L' : 'M') + xS(p.ts).toFixed(1) + ',' + yS(p.m).toFixed(1)).join(' ');
        const area = path + ' L' + xS(xMax).toFixed(1) + ',' + yS(0).toFixed(1) + ' L' + xS(xMin).toFixed(1) + ',' + yS(0).toFixed(1) + ' Z';
        const svg = '<svg width="' + W + '" height="' + H + '" style="display:block">' +
          '<path d="' + area + '" fill="#5C7A3A" fill-opacity="0.15"/>' +
          '<path d="' + path + '" stroke="#3D4A2A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' +
          '<line x1="' + pad + '" y1="' + yS(0) + '" x2="' + (W-pad) + '" y2="' + yS(0) + '" stroke="#999" stroke-width="0.5"/>' +
          '<line x1="' + pad + '" y1="' + yS(50) + '" x2="' + (W-pad) + '" y2="' + yS(50) + '" stroke="#999" stroke-width="0.5" stroke-dasharray="2,3"/>' +
          '<line x1="' + pad + '" y1="' + yS(100) + '" x2="' + (W-pad) + '" y2="' + yS(100) + '" stroke="#999" stroke-width="0.5"/>' +
          '<text x="' + (pad-4) + '" y="' + yS(0) + '" text-anchor="end" font-size="10" fill="#666" dy="3">0%</text>' +
          '<text x="' + (pad-4) + '" y="' + yS(50) + '" text-anchor="end" font-size="10" fill="#666" dy="3">50%</text>' +
          '<text x="' + (pad-4) + '" y="' + yS(100) + '" text-anchor="end" font-size="10" fill="#666" dy="3">100%</text>' +
          '<line x1="' + pad + '" y1="' + yS(30) + '" x2="' + (W-pad) + '" y2="' + yS(30) + '" stroke="#C0392B" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>' +
          '<text x="' + (W-pad-4) + '" y="' + (yS(30)-4) + '" text-anchor="end" font-size="9" fill="#C0392B">⚠ sec &lt; 30%</text>' +
          '</svg>';
        canvas.outerHTML = svg;
      });
    }

    // Carrega dades
    async function loadSensorsData() {
      const status = $('#sensors-status');
      const grid = $('#sensors-grid');
      const charts = $('#sensors-charts');
      try {
        const sensors = await fetchSensors();
        if (!sensors || sensors.length === 0) {
          status.innerHTML = '<span class="err">❌ No hi ha sensors registrats. Comprova el bridge LoRa.</span>';
          grid.innerHTML = '<div class="sensor-empty">Cap sensor trobat a la base de dades.<br>Esperant primeres dades del bridge LoRa...</div>';
          charts.innerHTML = '';
          return;
        }
        const online = sensors.filter(s => s.ts && (Date.now() - new Date(s.ts).getTime() < 30 * 60 * 1000)).length;
        status.innerHTML =
          '<span class="ok">✅ Connectat</span> · ' +
          '<span><b>' + sensors.length + '</b> sensors, <b>' + online + '</b> actius</span> · ' +
          '<span style="color:var(--c-ink-2)">' + escapeHtml(getSensorsUrl()) + '</span>';

        grid.innerHTML = sensors.map(s => {
          const ts = s.ts ? new Date(s.ts).toLocaleString('ca-ES', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' }) : '—';
          const data = JSON.parse(s.data_json || '{}');
          const moistureLow = data.moisture != null && data.moisture < 30;
          const isOffline = !s.ts || (Date.now() - new Date(s.ts).getTime() > 30 * 60 * 1000);
          return '<div class="sensor-card ' + (moistureLow ? 'alert' : '') + ' ' + (isOffline ? 'offline' : '') + '">' +
            '<div class="name">📍 ' + escapeHtml(s.parcela || s.sensor_id) + '</div>' +
            '<div class="ts">' + ts + (isOffline ? ' · <span style="color:#C0392B">fora de línia</span>' : '') + '</div>' +
            renderSensorValue(s) +
          '</div>';
        }).join('');

        // Renderitza gràfiques
        const parceles = [...new Set(sensors.map(s => s.parcela || s.sensor_id))];
        charts.innerHTML = '<h2 style="margin-top:28px">📈 Històric (últimes 24h)</h2>';
        for (const p of parceles) {
          const hist = await fetchSensorHistory(p, 24);
          if (hist.length === 0) continue;
          const points = hist.map(h => {
            const d = JSON.parse(h.data_json || '{}');
            return { ts: h.ts, moisture: d.moisture };
          }).filter(pt => pt.moisture != null);
          if (points.length < 2) continue;
          charts.innerHTML += '<div class="sensor-chart-wrap">' +
            '<h3>📍 ' + escapeHtml(p) + ' — humitat del sòl</h3>' +
            '<canvas class="sensor-chart" id="chart-' + p.replace(/[^a-z0-9]/gi, '_') + '"></canvas>' +
            '<div style="font-size:11px;color:var(--c-ink-2);margin-top:6px">' + points.length + ' lectures</div>' +
          '</div>';
        }
        for (const p of parceles) drawSensorChart(p);
      } catch (e) {
        status.innerHTML = '<span class="err">❌ ' + escapeHtml(e.message) + '</span>' +
          ' · <span style="color:var(--c-ink-2)">Comprova la URL del backend i que la Raspberry estigui engegada.</span>';
        grid.innerHTML = '<div class="sensor-empty">' +
          '⚠️ No es pot connectar amb el backend.<br><br>' +
          'Assegura\'t que:<br>' +
          '• La Raspberry està engegada i connectada a la xarxa<br>' +
          '• El servei <code>hort-backend</code> està actiu<br>' +
          '• La URL és correcta (per defecte <code>http://hortpi.local:8000</code>)<br>' +
          '• Si accedeixes des d\'internet, usa la IP de Tailscale' +
        '</div>';
        charts.innerHTML = '';
      }
    }

    loadSensorsData();
    setInterval(loadSensorsData, 60000);
  }

  // ───────────────── Selector de tema ─────────────────
  const THEME_KEY = 'hort-osona-theme';
  const THEMES = ['estiu', 'tardor', 'hivern'];
  function aplicarTema(tema) {
    if (THEMES.includes(tema)) {
      document.body.setAttribute('data-theme', tema);
    } else {
      document.body.removeAttribute('data-theme');
    }
    localStorage.setItem(THEME_KEY, tema || 'estiu');
    // Actualitzar botons actius
    document.querySelectorAll('.theme-picker button').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === (tema || 'estiu'));
    });
  }
  // Renderitzar el selector
  const picker = document.createElement('div');
  picker.className = 'theme-picker';
  picker.innerHTML = THEMES.map(t =>
    '<button data-theme="' + t + '">' + t.charAt(0).toUpperCase() + t.slice(1) + '</button>'
  ).join('');
  document.body.appendChild(picker);
  picker.addEventListener('click', e => {
    const btn = e.target.closest('button[data-theme]');
    if (btn) aplicarTema(btn.dataset.theme);
  });
  // Aplicar tema desat (o automàtic segons mes)
  const temaDesat = localStorage.getItem(THEME_KEY);
  if (temaDesat) {
    aplicarTema(temaDesat);
  } else {
    // Auto: detecta estació segons el mes actual
    const mes = new Date().getMonth() + 1;
    let temaAuto = 'estiu';
    if (mes >= 10 || mes <= 2) temaAuto = 'hivern';
    else if (mes >= 9 || mes <= 11) temaAuto = 'tardor';
    aplicarTema(temaAuto);
  }

  // ───────────────── PWA: registre del Service Worker ─────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('[PWA] Service Worker registrat:', reg.scope))
        .catch(err => console.warn('[PWA] Error registrant SW:', err));
    });
  }

  // ───────────────── PWA: prompt d'instal·lació ─────────────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (localStorage.getItem('pwa-banner-dismissed') &&
        Date.now() - parseInt(localStorage.getItem('pwa-banner-dismissed')) < 7 * 24 * 3600 * 1000) {
      return;
    }
    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = 'position:fixed;bottom:20px;left:20px;right:20px;max-width:520px;margin:auto;background:var(--c-olive);color:var(--c-bg);padding:14px 18px;border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:9999;display:flex;align-items:center;gap:12px;font-size:14px;';
    banner.innerHTML =
      '<div style="flex:1">' +
        '<strong>📱 Instal·la l\'app</strong><br>' +
        '<small>Per accedir des del mòbil, fins i tot sense internet</small>' +
      '</div>' +
      '<button id="pwa-install-yes" style="background:var(--c-bg);color:var(--c-olive);border:0;padding:8px 14px;border-radius:4px;cursor:pointer;font-weight:600">Instal·lar</button>' +
      '<button id="pwa-install-no" style="background:transparent;color:var(--c-bg);border:1px solid var(--c-bg);padding:8px 12px;border-radius:4px;cursor:pointer">Més tard</button>';
    document.body.appendChild(banner);
    document.getElementById('pwa-install-yes').addEventListener('click', async () => {
      banner.remove();
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    });
    document.getElementById('pwa-install-no').addEventListener('click', () => {
      banner.remove();
      localStorage.setItem('pwa-banner-dismissed', String(Date.now()));
    });
  });

  window.addEventListener('appinstalled', () => {
    const b = document.getElementById('pwa-install-banner');
    if (b) b.remove();
  });

  // ───────────────── Notificacions ─────────────────
  async function demanarPermisNotificacions() {
    if (!('Notification' in window)) return false;
    if (Notification.permission === 'granted') return true;
    if (Notification.permission === 'denied') return false;
    return (await Notification.requestPermission()) === 'granted';
  }
  function mostrarNotificacio(titol, cos) {
    if (Notification.permission !== 'granted') return null;
    const n = new Notification(titol, { body: cos, icon: 'icon-192.png', badge: 'icon-192.png', lang: 'ca' });
    setTimeout(() => n.close(), 10000);
    return n;
  }
  function programarNotificacioTasca(titol, desc, data) {
    const target = new Date(data).getTime();
    const diff = target - Date.now();
    if (diff <= 0) return;
    if (diff > 30 * 24 * 3600 * 1000) {
      setTimeout(() => programarNotificacioTasca(titol, desc, data), 25 * 24 * 3600 * 1000);
      return;
    }
    setTimeout(() => mostrarNotificacio('🌱 ' + titol, desc), diff);
  }
  function comprovarNotificacionsPendents() {
    const prog = JSON.parse(localStorage.getItem('notif-programades') || '[]');
    const ara = Date.now();
    for (const p of prog) {
      if (p.ts > ara && !p.notified) programarNotificacioTasca(p.titol, p.desc, p.ts);
    }
  }
  setInterval(comprovarNotificacionsPendents, 60000);
  comprovarNotificacionsPendents();

  window.hortOsona = {
    demanarPermisNotif: demanarPermisNotificacions,
    mostrarNotif: mostrarNotificacio,
    programarNotif: programarNotificacioTasca,
  };
})();
</script>
</body>
</html>
