<style>
  :root {
    --c-bg:        #F5EBD8;
    --c-bg-2:      #EFE3CB;
    --c-paper:     #FBF5E6;
    --c-ink:       #2B2418;
    --c-ink-2:     #5A4F3A;
    --c-line:      #D8C8A5;
    --c-line-2:    #C4B189;
    --c-olive:     #3D4A2A;
    --c-leaf:      #5C7A3A;
    --c-ochre:     #A8783E;
    --c-mud:       #6B4F2A;
    --c-accent-bg: #E8D9B0;
    --c-red:       #8C3A1A;
    --shadow:      0 1px 0 rgba(60,40,15,0.05), 0 2px 6px rgba(60,40,15,0.05);
    --radius:      6px;
    --sidebar-w:   290px;
    --header-h:    64px;
    --reading-max: 760px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--c-bg); color: var(--c-ink); }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: var(--c-ochre); text-decoration: none; border-bottom: 1px solid transparent; }
  a:hover { color: var(--c-mud); border-bottom-color: var(--c-ochre); }

  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

  /* Evitar scroll horitzontal a tot arreu */
  html, body { overflow-x: hidden; max-width: 100%; }

  /* ───── Temes (paleta segons estació) ───── */
  /* Estiu (per defecte) — verd fresc + ocre */
  :root {
    --c-bg:     #F5EBD8;
    --c-olive:  #3D4A2A;
    --c-ochre:  #A8783E;
    --c-leaf:   #5C7A3A;
    --c-mud:    #6B4F2A;
  }
  /* Tardor — tons terrosos, carbassa, granat */
  body[data-theme="tardor"] {
    --c-bg:     #F0E2C8;
    --c-olive:  #6B3A1F;
    --c-ochre:  #B85423;
    --c-leaf:   #8B6F2A;
    --c-mud:    #4A2818;
  }
  /* Hivern — blau-gris fred + verd pàl·lid */
  body[data-theme="hivern"] {
    --c-bg:     #ECEDF0;
    --c-olive:  #2C3E50;
    --c-ochre:  #5D8AA8;
    --c-leaf:   #4A6741;
    --c-mud:    #34495E;
  }

  /* Botó de canvi de tema */
  .theme-picker {
    position: fixed; top: 14px; right: 14px;
    z-index: 100;
    display: flex; gap: 6px;
    background: var(--c-bg);
    border: 1px solid var(--c-line);
    border-radius: 20px;
    padding: 6px 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-size: 12px;
  }
  .theme-picker button {
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 14px;
    color: var(--c-ink-2);
    font-weight: 500;
    transition: all 0.15s;
  }
  .theme-picker button:hover { background: var(--c-line-2); }
  .theme-picker button.active {
    background: var(--c-olive);
    color: var(--c-bg);
  }

  .sidebar {
    background: var(--c-bg-2);
    border-right: 1px solid var(--c-line);
    position: sticky; top: 0; align-self: start;
    height: 100vh; overflow-y: auto;
    padding: 22px 18px 32px;
  }
  .brand {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin: 0 0 4px;
    color: var(--c-olive);
  }
  .brand .leaf { color: var(--c-leaf); }
  .brand-sub {
    font-size: 12px;
    color: var(--c-ink-2);
    margin-bottom: 18px;
    letter-spacing: 0.02em;
  }
  .search-wrap { position: relative; margin-bottom: 18px; }
  .search {
    width: 100%;
    font: inherit; font-size: 14px;
    padding: 9px 12px 9px 34px;
    background: var(--c-paper);
    border: 1px solid var(--c-line-2);
    border-radius: var(--radius);
    color: var(--c-ink);
    transition: border-color .15s;
  }
  .search:focus { outline: none; border-color: var(--c-leaf); box-shadow: 0 0 0 3px rgba(92,122,58,0.15); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--c-ink-2); font-size: 15px; pointer-events: none;
  }
  .nav { list-style: none; padding: 0; margin: 0; }
  .nav-cat { margin: 0 0 4px; }
  .nav-cat-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; text-align: left;
    background: transparent; border: 0; cursor: pointer;
    font: inherit; font-size: 14px; font-weight: 600;
    color: var(--c-olive);
    padding: 8px 8px; border-radius: var(--radius);
    letter-spacing: 0.01em;
  }
  .nav-cat-btn:hover { background: var(--c-accent-bg); }
  .nav-cat-btn.cat-focused { background: var(--c-accent-bg); box-shadow: inset 3px 0 0 var(--c-ochre); }
  .nav-cat-btn .em { font-size: 16px; }
  .nav-cat-btn .ct {
    margin-left: auto;
    font-size: 11px; font-weight: 500;
    color: var(--c-ink-2);
    background: var(--c-bg);
    padding: 1px 7px; border-radius: 10px;
    border: 1px solid var(--c-line);
  }
  .nav-items { list-style: none; padding: 0 0 6px 24px; margin: 0; }
  .nav-items li { margin: 0; }
  .nav-item {
    display: block; padding: 5px 8px;
    font-size: 13.5px;
    color: var(--c-ink-2);
    border-radius: 4px;
    border-bottom: 0;
    line-height: 1.35;
  }
  .nav-item:hover { background: var(--c-accent-bg); color: var(--c-ink); }
  .nav-item.active { background: var(--c-olive); color: var(--c-bg); font-weight: 500; }
  .nav-cat.collapsed .nav-items { display: none; }
  .sidebar-foot {
    margin-top: 22px; padding-top: 16px;
    border-top: 1px dashed var(--c-line-2);
    font-size: 11.5px; color: var(--c-ink-2);
    line-height: 1.5;
  }

  .main { padding: 0; min-width: 0; }
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 32px;
    background: var(--c-bg-2);
    border-bottom: 1px solid var(--c-line);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(6px);
  }
  .crumbs {
    font-size: 13px; color: var(--c-ink-2);
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .crumbs a { color: var(--c-ink-2); border-bottom: 0; }
  .crumbs a:hover { color: var(--c-ochre); }
  .crumbs .sep { margin: 0 6px; color: var(--c-line-2); }
  .topbar-meta {
    font-size: 12px; color: var(--c-ink-2);
    font-variant-numeric: tabular-nums;
  }
  .reader {
    max-width: var(--reading-max);
    margin: 0 auto;
    padding: 36px 32px 96px;
  }
  .reader-inner {
    background: var(--c-paper);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 36px 44px 44px;
    box-shadow: var(--shadow);
  }

  .doc h1, .doc h2, .doc h3, .doc h4, .doc h5 {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--c-olive);
    letter-spacing: -0.005em;
    line-height: 1.25;
  }
  .doc h1 {
    font-size: 32px; font-weight: 600;
    margin: 0 0 8px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--c-ochre);
  }
  .doc h2 {
    font-size: 22px; font-weight: 600;
    margin: 36px 0 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--c-line);
  }
  .doc h3 { font-size: 17px; font-weight: 600; margin: 26px 0 8px; color: var(--c-mud); }
  .doc h4 { font-size: 15px; font-weight: 600; margin: 20px 0 6px; }
  .doc p { margin: 0 0 14px; }
  .doc ul, .doc ol { margin: 0 0 14px; padding-left: 24px; }
  .doc li { margin: 4px 0; }
  .doc li > p { margin: 4px 0; }
  .doc blockquote {
    margin: 16px 0;
    padding: 10px 16px;
    border-left: 3px solid var(--c-ochre);
    background: var(--c-accent-bg);
    color: var(--c-ink-2);
    font-style: italic;
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .doc blockquote p { margin: 0; }
  .doc code {
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 0.88em;
    background: var(--c-accent-bg);
    padding: 1px 5px; border-radius: 3px;
    color: var(--c-mud);
  }
  .doc pre {
    background: #2B2418; color: #F5EBD8;
    padding: 14px 18px; border-radius: var(--radius);
    overflow-x: auto;
    font-size: 13px; line-height: 1.55;
  }
  .doc pre code { background: transparent; color: inherit; padding: 0; font-size: inherit; }
  .doc table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 14px;
    background: var(--c-paper);
  }
  .doc th, .doc td {
    border: 1px solid var(--c-line);
    padding: 6px 10px;
    text-align: left;
    vertical-align: top;
  }
  .doc th {
    background: var(--c-bg-2);
    font-weight: 600;
    color: var(--c-olive);
  }
  .doc tr:nth-child(even) td { background: rgba(232,217,176,0.4); }
  .doc hr {
    border: 0; border-top: 1px dashed var(--c-line-2);
    margin: 28px 0;
  }
  .doc img { max-width: 100%; height: auto; border-radius: var(--radius); }
  .doc-meta {
    font-size: 13px; color: var(--c-ink-2);
    margin-bottom: 18px;
    font-family: 'JetBrains Mono', monospace;
  }
  .doc-meta .pill {
    display: inline-block;
    background: var(--c-accent-bg);
    color: var(--c-olive);
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 12px;
    margin-right: 6px;
  }

  .welcome {
    max-width: var(--reading-max);
    margin: 0 auto;
    padding: 48px 32px;
  }
  .welcome-card {
    background: var(--c-paper);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 44px;
    box-shadow: var(--shadow);
  }
  .welcome h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 40px; font-weight: 600;
    color: var(--c-olive);
    margin: 0 0 8px;
    line-height: 1.1;
  }
  .welcome h1 .leaf { color: var(--c-leaf); }
  .welcome .lede {
    font-size: 17px; color: var(--c-ink-2);
    margin: 0 0 24px;
    line-height: 1.55;
  }
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; margin: 24px 0 32px;
  }
  .stat {
    background: var(--c-bg-2);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-n { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--c-leaf); line-height: 1; }
  .stat-l { font-size: 12.5px; color: var(--c-ink-2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .cat-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; margin-top: 8px;
  }
  .cat-card {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--c-bg-2);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    color: var(--c-ink);
    border-bottom: 1px solid var(--c-line);
    transition: transform .12s, background .12s;
  }
  .cat-card:hover { background: var(--c-accent-bg); transform: translateY(-1px); border-bottom-color: var(--c-ochre); color: var(--c-ink); }
  .cat-card .em { font-size: 20px; }
  .cat-card .nm { font-weight: 600; font-size: 14.5px; color: var(--c-olive); flex: 1; }
  .cat-card .ct {
    font-size: 12px; color: var(--c-ink-2);
    font-variant-numeric: tabular-nums;
    background: var(--c-paper); padding: 1px 8px; border-radius: 10px;
    border: 1px solid var(--c-line);
  }

  .empty, .no-results {
    padding: 60px 30px; text-align: center;
    color: var(--c-ink-2);
  }
  .empty .em { font-size: 48px; display: block; margin-bottom: 10px; }

  .hl { background: #F2D88A; color: var(--c-ink); padding: 0 2px; border-radius: 2px; }

  /* ───── Giny de checklist del mes ───── */
  .month-widget {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin: 24px 0;
  }
  .month-card {
    background: var(--c-bg-2);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .month-card h3 {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--c-olive);
    font-size: 18px;
    margin: 0 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .lunar-strip { display: flex; gap: 8px; margin-top: 10px; }
  .lunar-cell {
    flex: 1; text-align: center;
    background: var(--c-paper);
    border: 1px solid var(--c-line);
    border-radius: 4px;
    padding: 6px 4px;
    font-size: 11.5px;
    color: var(--c-ink-2);
  }
  .lunar-cell .em { font-size: 22px; display: block; line-height: 1.1; }
  .lunar-cell .dt { font-size: 10.5px; color: var(--c-ink-2); }
  .top-task {
    background: var(--c-paper);
    border-left: 3px solid var(--c-red);
    padding: 10px 14px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin-top: 8px;
  }
  .top-task strong { color: var(--c-olive); }
  .top-task small { display: block; color: var(--c-ink-2); margin-top: 4px; font-size: 12.5px; line-height: 1.4; }
  .open-checklist {
    display: inline-block;
    margin-top: 12px;
    padding: 7px 14px;
    background: var(--c-leaf);
    color: var(--c-bg);
    border-radius: var(--radius);
    font-size: 13.5px;
    font-weight: 500;
    border-bottom: 0;
  }
  .open-checklist:hover { background: var(--c-olive); color: var(--c-bg); }
  .meteo-widget {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--c-paper);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--c-ink-2);
  }
  .meteo-widget .meteo-temp { font-size: 22px; color: var(--c-olive); font-weight: 600; font-family: 'Fraunces', serif; }
  .meteo-widget .meteo-cond { color: var(--c-ink); }
  .meteo-widget .meteo-lloc { font-size: 11.5px; color: var(--c-ink-2); margin-top: 4px; }
  .meteo-forecast { display: flex; gap: 6px; margin-top: 8px; font-size: 11.5px; }
  .meteo-day { flex: 1; text-align: center; padding: 4px 2px; background: var(--c-bg-2); border-radius: 3px; }
  .meteo-day .em { font-size: 16px; display: block; }

  /* ───── Pàgina completa de checklist ───── */
  .checklist-page { max-width: var(--reading-max); margin: 0 auto; padding: 36px 32px 96px; }
  .checklist-page-inner {
    background: var(--c-paper);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 36px 44px 44px;
    box-shadow: var(--shadow);
  }
  .checklist-page h1 {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--c-olive);
    font-size: 32px; font-weight: 600;
    margin: 0 0 8px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--c-ochre);
  }
  .clima-note {
    background: var(--c-accent-bg);
    border-left: 3px solid var(--c-ochre);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 14px 0 24px;
    color: var(--c-ink-2);
    font-size: 14.5px;
    line-height: 1.55;
  }
  .checklist-section { margin: 28px 0 18px; }
  .checklist-section h2 {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--c-olive);
    font-size: 20px;
    margin: 0 0 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--c-line);
  }
  .lunar-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
  .lunar-table th, .lunar-table td { border: 1px solid var(--c-line); padding: 8px 10px; text-align: left; vertical-align: top; }
  .lunar-table th { background: var(--c-bg-2); color: var(--c-olive); font-weight: 600; }
  .task-list { list-style: none; padding: 0; margin: 8px 0; }
  .task-list li { margin: 6px 0; }
  .task-list label { display: flex; gap: 10px; align-items: flex-start; cursor: pointer; line-height: 1.4; }
  .task-list input[type="checkbox"] { margin-top: 3px; transform: scale(1.1); accent-color: var(--c-leaf); }
  .task-list .prio { font-size: 12px; flex-shrink: 0; }
  .task-list .desc { color: var(--c-ink-2); font-size: 13px; display: block; margin-top: 2px; }
  .task-list li[data-prio="5"] { background: rgba(140,58,26,0.05); padding: 4px 6px; border-radius: 4px; }
  .task-list li.done { opacity: 0.5; text-decoration: line-through; }
  .dates-clau { background: var(--c-bg-2); border: 1px dashed var(--c-line-2); padding: 14px 18px; border-radius: var(--radius); margin: 24px 0; }
  .dates-clau h3 { font-family: 'Fraunces', Georgia, serif; color: var(--c-olive); margin: 0 0 8px; font-size: 17px; }
  .dates-clau ul { margin: 0; padding-left: 20px; }
  .dates-clau li { margin: 4px 0; font-size: 14px; }
  .prompt-box {
    background: #2B2418; color: #F5EBD8;
    padding: 16px 20px; border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px; line-height: 1.55;
    white-space: pre-wrap;
    max-height: 400px; overflow-y: auto;
    margin: 12px 0;
  }
  .copy-btn {
    background: var(--c-leaf); color: var(--c-bg);
    border: 0; padding: 6px 12px; border-radius: 4px;
    font: inherit; font-size: 13px; cursor: pointer;
  }
  .copy-btn:hover { background: var(--c-olive); }

  /* ───── Quadern d'observació ───── */
  .quadern-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }
  .quadern-form label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--c-ink-2); }
  .quadern-form input, .quadern-form textarea, .quadern-form select {
    font: inherit; font-size: 14px;
    padding: 7px 10px;
    background: var(--c-paper);
    border: 1px solid var(--c-line-2);
    border-radius: 4px;
    color: var(--c-ink);
  }
  .quadern-form input:focus, .quadern-form textarea:focus, .quadern-form select:focus {
    outline: none; border-color: var(--c-leaf);
    box-shadow: 0 0 0 3px rgba(92,122,58,0.15);
  }
  .quadern-form textarea { min-height: 70px; resize: vertical; font-family: inherit; }
  .quadern-form .full { grid-column: 1 / -1; }
  .quadern-entries { margin-top: 24px; }
  .quadern-entry {
    background: var(--c-bg-2);
    border: 1px solid var(--c-line);
    border-left: 3px solid var(--c-leaf);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 12px 16px;
    margin: 8px 0;
    position: relative;
  }
  .quadern-entry .data { font-size: 12px; color: var(--c-ink-2); margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
  .quadern-entry .meteo { font-size: 13.5px; color: var(--c-olive); margin-bottom: 4px; }
  .quadern-entry .notes { color: var(--c-ink); line-height: 1.5; white-space: pre-wrap; }
  .quadern-entry .del {
    position: absolute; top: 8px; right: 10px;
    background: transparent; border: 0; color: var(--c-ink-2);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
  }
  .quadern-entry .del:hover { color: var(--c-red); }
  .quadern-actions { margin: 18px 0; display: flex; gap: 10px; flex-wrap: wrap; }
  .quadern-empty { text-align: center; color: var(--c-ink-2); padding: 30px; font-style: italic; }

  /* ───── Calculadora de rotacions ───── */
  .rotacions-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin: 16px 0;
  }
  .rot-parcela {
    background: var(--c-paper);
    border: 2px solid var(--c-line);
    border-radius: var(--radius);
    padding: 12px;
    min-height: 110px;
    transition: border-color .15s;
  }
  .rot-parcela.tocado { border-color: var(--c-red); }
  .rot-parcela.ok { border-color: var(--c-leaf); }
  .rot-parcela h4 {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--c-olive);
    margin: 0 0 6px;
    font-size: 15px;
  }
  .rot-parcela label { display: block; font-size: 12px; color: var(--c-ink-2); margin-top: 6px; }
  .rot-parcela select, .rot-parcela input {
    width: 100%;
    font: inherit; font-size: 13px;
    padding: 4px 6px;
    background: var(--c-bg-2);
    border: 1px solid var(--c-line);
    border-radius: 3px;
    color: var(--c-ink);
    margin-top: 2px;
  }
  .rot-parcela .suggeriment {
    font-size: 11.5px;
    color: var(--c-leaf);
    margin-top: 4px;
    line-height: 1.35;
  }
  .rot-parcela .alerta {
    font-size: 11.5px;
    color: var(--c-red);
    margin-top: 4px;
  }
  .rot-config {
    display: flex; gap: 14px; align-items: end; flex-wrap: wrap;
    background: var(--c-bg-2); padding: 12px 16px; border-radius: var(--radius);
    margin-bottom: 16px;
  }
  .rot-config label { font-size: 13px; color: var(--c-ink-2); }
  .rot-config input { width: 60px; }
  .familia-color { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  /* ───── Calculadora de dates ───── */
  .dates-perfil {
    background: var(--c-bg-2);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin: 16px 0;
  }
  .dates-perfil h3 { font-family: 'Fraunces', serif; color: var(--c-olive); margin: 0 0 10px; font-size: 17px; }
  .dates-perfil-row { display: flex; gap: 14px; align-items: end; flex-wrap: wrap; }
  .dates-perfil label { font-size: 13px; color: var(--c-ink-2); display: flex; flex-direction: column; gap: 4px; }
  .dates-perfil input, .dates-perfil select {
    font: inherit; font-size: 14px;
    padding: 6px 10px;
    background: var(--c-paper);
    border: 1px solid var(--c-line-2);
    border-radius: 4px;
    color: var(--c-ink);
  }
  .dates-perfil select { min-width: 220px; }
  .cultiu-row {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 10px; padding: 8px 12px;
    border-bottom: 1px solid var(--c-line);
    align-items: center;
    font-size: 13.5px;
  }
  .cultiu-row.head { background: var(--c-bg-2); font-weight: 600; color: var(--c-olive); font-family: 'Fraunces', serif; }
  .cultiu-row:last-child { border-bottom: 0; }
  .cultiu-row .nom { font-weight: 500; }
  .cultiu-row .dies { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--c-mud); }
  .cultiu-row .finestra { color: var(--c-leaf); font-weight: 500; }
  .cultiu-row.alerta { background: rgba(140,58,26,0.06); }
  .cultiu-row.alerta .finestra { color: var(--c-red); }
  .dates-extra { font-size: 12.5px; color: var(--c-ink-2); margin-top: 12px; line-height: 1.5; }

  /* ───── Estadístiques ───── */
  .stats-bar { display: flex; align-items: flex-end; gap: 6px; height: 140px; padding: 10px 0; border-bottom: 1px solid var(--c-line); }
  .stats-mes { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stats-mes .barra { width: 100%; background: var(--c-leaf); border-radius: 3px 3px 0 0; min-height: 2px; transition: height .3s; }
  .stats-mes .pct { font-size: 10.5px; color: var(--c-ink-2); font-family: 'JetBrains Mono', monospace; }
  .stats-mes .nom { font-size: 11px; color: var(--c-ink-2); text-transform: uppercase; }
  .stats-cat-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .stats-cat-nom { width: 130px; font-size: 13px; color: var(--c-ink); }
  .stats-cat-barra { flex: 1; height: 14px; background: var(--c-bg-2); border-radius: 3px; overflow: hidden; }
  .stats-cat-emplenat { height: 100%; background: linear-gradient(to right, var(--c-leaf), var(--c-ochre)); border-radius: 3px; }
  .stats-cat-pct { width: 50px; text-align: right; font-size: 12.5px; color: var(--c-ink-2); font-family: 'JetBrains Mono', monospace; }
  .stats-resum { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
  .stats-resum-card {
    background: var(--c-bg-2);
    border: 1px solid var(--c-line);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .stats-resum-card .gran { font-family: 'Fraunces', serif; font-size: 32px; color: var(--c-olive); font-weight: 600; line-height: 1; }
  .stats-resum-card .lbl { font-size: 11.5px; color: var(--c-ink-2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

  /* ───── Calendari anual d'observacions ───── */
  .cal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 16px 0; }
  .cal-mes { background: var(--c-bg-2); border: 1px solid var(--c-line); border-radius: var(--radius); padding: 10px 12px; }
  .cal-mes h3 { font-family: 'Fraunces', serif; color: var(--c-olive); margin: 0 0 6px; font-size: 14px; text-align: center; }
  .cal-dies-cap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; font-size: 10px; color: var(--c-ink-2); text-align: center; margin-bottom: 2px; }
  .cal-dies { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day {
    aspect-ratio: 1; min-height: 26px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--c-paper); border-radius: 3px;
    font-size: 11px; color: var(--c-ink);
    position: relative; cursor: default;
    border: 1px solid var(--c-line);
  }
  .cal-day.empty { background: transparent; border: 0; }
  .cal-day.te { background: var(--c-ochre); color: white; border-color: var(--c-ochre); font-weight: 600; }
  .cal-day.avui { background: var(--c-leaf); color: white; border-color: var(--c-leaf); font-weight: 600; }
  .cal-n { font-size: 11px; }
  .cal-dot {
    position: absolute; bottom: 1px; right: 1px;
    background: var(--c-red); color: white;
    width: 12px; height: 12px;
    border-radius: 50%;
    font-size: 8px; line-height: 12px; text-align: center;
    font-weight: 700;
  }

  /* ───── Fonts locals ───── */
  .font-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--c-line);
  }
  .font-item:last-child { border-bottom: 0; }
  .font-nom {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--c-olive);
    text-decoration: none;
    font-weight: 500;
  }
  .font-nom:hover { text-decoration: underline; }
  .font-desc { color: var(--c-ink-2); font-size: 13.5px; margin: 4px 0 2px; line-height: 1.5; }
  .font-url { color: var(--c-ink-2); font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: 0.7; }

  /* ───── Impressió / PDF ───── */
  @media print {
    .sidebar, .open-checklist, .copy-btn, .quadern-actions, .quadern-form, .cat-grid { display: none !important; }
    body { background: white !important; color: black !important; }
    .checklist-page { padding: 0 !important; max-width: 100% !important; }
    .checklist-page-inner { padding: 10mm !important; max-width: 100% !important; }
    h1 { page-break-after: avoid; }
    table { page-break-inside: avoid; }
    .checklist-section { page-break-inside: avoid; border-bottom: 1px solid #999; padding-bottom: 8px; margin-bottom: 14px; }
    pre.prompt-box { display: none !important; }
  }

  /* ───── Sensors IoT ───── */
  .sensors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin: 20px 0; }
  .sensor-card {
    background: var(--c-paper); border: 1px solid var(--c-line);
    border-radius: var(--radius); padding: 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .sensor-card.offline { opacity: 0.5; }
  .sensor-card.alert { border-color: #C0392B; border-width: 2px; }
  .sensor-card .name { font-family: 'Fraunces', serif; font-size: 18px; color: var(--c-olive); }
  .sensor-card .ts { font-size: 11px; color: var(--c-ink-2); }
  .sensor-card .metric { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px dashed var(--c-line-2); }
  .sensor-card .metric:last-child { border: 0; }
  .sensor-card .metric .k { font-size: 12px; color: var(--c-ink-2); text-transform: uppercase; letter-spacing: 0.04em; }
  .sensor-card .metric .v { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .sensor-card .metric .u { font-size: 12px; color: var(--c-ink-2); margin-left: 2px; }
  .sensor-card .bar { height: 6px; background: var(--c-line-2); border-radius: 3px; overflow: hidden; margin-top: 2px; }
  .sensor-card .bar > div { height: 100%; transition: width 0.5s; }
  .bar-h > div { background: var(--c-leaf); }
  .bar-h-low > div { background: #C0392B; }
  .bar-t > div { background: var(--c-ochre); }
  .bar-l > div { background: #D4AC0D; }
  .sensors-status {
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; background: var(--c-paper);
    border: 1px solid var(--c-line); border-radius: var(--radius);
    margin-bottom: 20px; font-size: 13px;
  }
  .sensors-status .ok { color: var(--c-leaf); }
  .sensors-status .err { color: #C0392B; }
  .sensors-config {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 14px; font-size: 13px;
  }
  .sensors-config input {
    flex: 1; font: inherit; padding: 6px 10px;
    border: 1px solid var(--c-line); border-radius: 4px;
    background: var(--c-bg);
  }
  .sensors-config button {
    padding: 6px 12px; background: var(--c-olive); color: var(--c-bg);
    border: 0; border-radius: 4px; cursor: pointer; font-weight: 500;
  }
  .sensor-chart-wrap {
    background: var(--c-paper); border: 1px solid var(--c-line);
    border-radius: var(--radius); padding: 16px; margin: 16px 0;
  }
  .sensor-chart-wrap h3 { margin: 0 0 8px; font-size: 14px; color: var(--c-olive); }
  .sensor-chart { width: 100%; height: 180px; }
  .sensor-empty {
    text-align: center; padding: 40px 20px;
    color: var(--c-ink-2); font-size: 14px;
  }
  .sensor-empty code {
    background: var(--c-line-2); padding: 2px 6px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  @media (max-width: 820px) {
    .quadern-form { grid-template-columns: 1fr; }
    .month-widget { grid-template-columns: 1fr; }
  }

  @media (max-width: 820px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .sidebar {
      position: sticky;
      top: 0;
      z-index: 50;
      max-height: 50vh;
      overflow-y: auto;
      border-right: 0;
      border-bottom: 1px solid var(--c-line);
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .sidebar .nav { max-height: none; overflow: visible; }
    .reader, .welcome { padding: 18px 14px; }
    .reader-inner { padding: 18px 14px; }
    .stats { grid-template-columns: 1fr; }
    .cat-grid { grid-template-columns: 1fr; gap: 8px; }
    .cat-card { padding: 10px 12px; }
    .topbar { padding: 10px 14px; }
    .month-card { padding: 12px 14px; }
    h1 { font-size: 26px !important; }
    .cal-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 480px) {
    .stat-n { font-size: 22px; }
    .cal-mes { padding: 8px 10px; }
    .cal-mes h3 { font-size: 12px; }
    .welcome { padding: 12px 10px; }
    .checklist-page { padding: 18px 10px 60px; }
    .quadern-form { gap: 10px; }
    .copy-btn { padding: 8px 12px; font-size: 13px; }
  }

  @media print {
    .sidebar, .topbar { display: none; }
    .app { grid-template-columns: 1fr; }
    .reader-inner { border: 0; box-shadow: none; padding: 0; }
    .doc a { color: var(--c-ink); }
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar" aria-label="Navegació">
    <h1 class="brand"><span class="leaf">🌱</span> Hort Osona</h1>
    <p class="brand-sub">Base de coneixement · Osona</p>
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input id="search" class="search" type="search" placeholder="Cerca per títol o text…" autocomplete="off" spellcheck="false">
    </div>
    <ul class="nav" id="nav"></ul>
    <div class="sidebar-foot">
      Generat el __DATE__<br>
      __TOTAL__ documents · __NCAT__ categories<br>
      <a href="build.py" style="border-bottom:0;color:var(--c-ochre)">build.py</a> regenera el lloc
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="crumbs" id="crumbs">
        <a href="#" data-home>🌱 Hort Osona</a>
      </div>
      <div class="topbar-meta" id="topbar-meta">__TOTAL__ documents</div>
    </div>
    <div id="view" class="welcome"></div>
  </main>

</div>

<script>
(() => {
  const DOCS = __DOCS__;
  const SIDEBAR = __SIDEBAR__;
  const TOTAL = __TOTAL__;
  const CHECKLIST = __CHECKLIST__;

  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  const debounce = (fn, ms=120) => {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  };

  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);

  const escapeRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

  function readHash() {
    const m = location.hash.match(/[#&]doc=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function readCatHash() {
    const m = location.hash.match(/[#&]cat=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function isChecklistHash() {
    return /[#&]checklist(?:&|$)/.test(location.hash);
  }
  function isQuadernHash() {
    return /[#&]quadern(?:&|$)/.test(location.hash);
  }
  function isRotacionsHash() {
    return /[#&]rotacions(?:&|$)/.test(location.hash);
  }
  function isDatesHash() {
    return /[#&]dates(?:&|$)/.test(location.hash);
  }
  function isStatsHash() {
    return /[#&]stats(?:&|$)/.test(location.hash);
  }
  function isFontsHash() {
    return /[#&]fonts(?:&|$)/.test(location.hash);
  }
  function isSensorsHash() {
    return /[#&]sensors(?:&|$)/.test(location.hash);
  }
  function isCalendariHash() {
    return /[#&]calendari(?:&|$)/.test(location.hash);
  }
  function writeHash(id) {
    const newHash = '#doc=' + encodeURIComponent(id);
    if (location.hash !== newHash) {
      history.replaceState(null, '', newHash);
    }
  }

  const INDEX = DOCS.map(d => ({
    id: d.id,
    title: d.title,
    summary: d.summary,
    category: d.category,
    path: d.path,
    hay: (d.title + ' ' + d.summary + ' ' + d.path).toLowerCase()
  }));

  function searchDocs(q) {
    q = q.trim().toLowerCase();
    if (!q) return null;
    const tokens = q.split(/\s+/).filter(Boolean);
    return INDEX
      .map(d => {
        const hay = d.hay;
        const all = tokens.every(t => hay.includes(t));
        return all ? d : null;
      })
      .filter(Boolean);
  }

  function highlightText(text, tokens) {
    if (!tokens.length) return escapeHtml(text);
    const pattern = new RegExp('(' + tokens.map(escapeRe).join('|') + ')', 'gi');
    return escapeHtml(text).replace(pattern, '<mark class="hl">$1</mark>');
  }

  function renderDoc(id) {
    const doc = DOCS.find(d => d.id === id);
    if (!doc) { renderWelcome(); return; }

    writeHash(id);
    document.title = doc.title + ' · Hort Osona';

    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<span>' + escapeHtml(doc.category) + '</span>' +
      '<span class="sep">›</span>' +
      '<span>' + escapeHtml(doc.title) + '</span>';

    const view = $('#view');
    view.className = 'reader';
    view.innerHTML =
      '<div class="reader-inner">' +
        '<div class="doc-meta">' +
          '<span class="pill">' + escapeHtml(doc.category) + '</span>' +
          '<span>' + escapeHtml(doc.path) + '</span>' +
        '</div>' +
        '<article class="doc">' + doc.html + '</article>' +
      '</div>';

    $$('.nav-item').forEach(a => a.classList.toggle('active', a.dataset.id === id));
    const cat = $('.nav-cat-btn[data-cat="' + CSS.escape(doc.category) + '"]');
    if (cat) cat.parentElement.classList.remove('collapsed');
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function renderWelcome() {
    document.title = 'Hort Osona · Base de coneixement';
    $('#crumbs').innerHTML = '<a href="#" data-home>🌱 Hort Osona</a>';
    const view = $('#view');
    view.className = 'welcome';
    let widgetHtml = '';
    if (CHECKLIST) {
      const mesCapital = CHECKLIST.mes_ca.charAt(0).toUpperCase() + CHECKLIST.mes_ca.slice(1);
      // Determinar setmana actual (la que conté avui)
      const avui = new Date();
      const avuiIso = avui.toISOString().slice(0,10);
      const setmanaActual = CHECKLIST.setmanes.find(s => s.inici <= avuiIso && s.fi >= avuiIso) || CHECKLIST.setmanes[0];
      // Top tasca: la primera amb prio >= 4
      const top = CHECKLIST.tasques.find(t => t.prio >= 4) || CHECKLIST.tasques[0];
      const prioStr = top.prio >= 5 ? '🔴 Urgent' : (top.prio >= 4 ? '🟠 Important' : '🟡 Recomanat');
      // Strip de les 4 primeres setmanes
      const stripCells = CHECKLIST.setmanes.slice(0, 4).map(s => {
        const dt = s.inici.slice(8,10) + '/' + s.inici.slice(5,7);
        return '<div class="lunar-cell"><span class="em">' + s.fase.emoji + '</span><span class="dt">' + dt + '</span></div>';
      }).join('');
      widgetHtml =
        '<div class="month-widget">' +
          '<div class="month-card">' +
            '<h3>📅 ' + mesCapital + ' ' + CHECKLIST.year + '</h3>' +
            '<div style="font-size:13.5px;color:var(--c-ink-2)">' +
              setmanaActual.fase.emoji + ' ' + escapeHtml(setmanaActual.fase.etiqueta) + ' — ' + escapeHtml(setmanaActual.fase.desc) +
            '</div>' +
            '<div class="top-task" style="margin-top:12px">' +
              '<span class="prio" style="font-size:11px;color:var(--c-ink-2)">' + prioStr + '</span><br>' +
              '<strong>' + escapeHtml(top.titol) + '</strong>' +
              '<small>' + escapeHtml(top.desc) + '</small>' +
            '</div>' +
            '<div id="meteo-actual"></div>' +
          '</div>' +
          '<div class="month-card">' +
            '<h3>🌙 Calendari lunar</h3>' +
            '<div style="font-size:12.5px;color:var(--c-ink-2);margin-bottom:4px">4 setmanes del mes</div>' +
            '<div class="lunar-strip">' + stripCells + '</div>' +
            '<a class="open-checklist" href="#checklist">Obrir checklist completa →</a>' +
          '</div>' +
        '</div>';
    }
    view.innerHTML =
      '<div class="welcome-card">' +
        '<h1><span class="leaf">🌱</span> Hort Osona</h1>' +
        '<p class="lede">Base de coneixement personal d\'hort ecològic, plantes medicinals, bolets i conserves, ' +
        'adaptat a la comarca d\'<strong>Osona</strong> (Catalunya central). ' +
        'Tria una categoria o comença a cercar a dalt a l\'esquerra.</p>' +
        widgetHtml +
        '<div class="stats">' +
          '<div class="stat"><div class="stat-n">' + TOTAL + '</div><div class="stat-l">Documents</div></div>' +
          '<div class="stat"><div class="stat-n">' + SIDEBAR.length + '</div><div class="stat-l">Categories</div></div>' +
          '<div class="stat"><div class="stat-n">2026</div><div class="stat-l">Temporada</div></div>' +
        '</div>' +
        '<div class="cat-grid">' +
          '<a class="cat-card" href="#checklist" data-cat="Checklist">' +

  // Regla bàsica: NO repetir la mateixa família, i els lleguminoses van bé
  // després de qualsevol perquè fixen nitrogen
  function familiaOK(novaFamilia, familiesAnteriors) {
    if (!novaFamilia) return { ok: true, motiu: '' };
    if (novaFamilia === 'repous' || novaFamilia === 'adob_verd') {
      return { ok: true, motiu: 'Tots els anys' };
    }
    if (familiesAnteriors.length === 0) {
      return { ok: true, motiu: 'Primera plantada' };
    }
    if (familiesAnteriors[0] === novaFamilia) {
      return { ok: false, motiu: '⚠️ Mateixa família que l\'any passat! Riscos: plagues, malalties, esgotament del sòl.' };
    }
    if (novaFamilia === 'fabacia') {
      return { ok: true, motiu: 'Lleguminosa: bona després de qualsevol (fixa nitrogen)' };
    }
    return { ok: true, motiu: 'OK' };
  }

    // actual + una estimació conservadora.

    // (només un mes), i per als altres agafem el recompte de tasques marcades.

    // Solució simple: comptem només les tasques marcades al llarg de l'any
    // llegint totes les claus de localStorage.

      const k = localStorage.key(i);
      if (k && k.startsWith('checklist-' + anyActual + '-')) {
        const parts = k.split('-');
        const mes = parseInt(parts[2]) - 1;
        if (mes >= 0 && mes < 12) {
          perMes[mes]++;
          totalMarcades++;
        }
      }
    }

    // Per simplificar, comptem les tasques dels 12 mesos com a iguals (les del fitxer

    const tasquesPerMes = Array(12).fill(0);

    let rows = '';

      const dataFinalTardor = new Date(ultimaGla.getTime() + c.tardor * 86400000);
      const alerta = dataProtegida < iniciAny;
      const finestraText = alerta
        ? '⚠️ Massa aviat'
        : (dataExterior < avui
            ? 'Ja ha passat — pots plantar'
            : formatData(dataProtegida) + ' → ' + formatData(dataFinalTardor));
      rows +=
        '<div class="cultiu-row' + (alerta ? ' alerta' : '') + '">' +
          '<span class="nom">' + c.nom + '</span>' +
          '<span class="dies">protegida: +' + c.prot + 'd</span>' +
          '<span class="dies">exterior: +' + c.ext + 'd</span>' +

    view.innerHTML =
      '<div class="checklist-page-inner">' +

          '<h3>Configuració</h3>' +

            '</label>' +

              '<input type="date" id="d-gla" value="' + (config.ultimaGlaUsuari || '') + '">' +
            '</label>' +
            '<button class="copy-btn" id="d-calc">🔄 Calcular</button>' +
          '</div>' +
          '<div class="dates-extra">' +
            'Calculat per: <strong>' + perfil.nom + '</strong> · ' +
            'Darrera glaçada: <strong>' + formatData(ultimaGla) + '</strong> · ' +
            'Zona: <strong>' + perfil.zona + '</strong>' +
          '</div>' +
        '</div>' +
        '<div class="checklist-section">' +
          '<h2>Cultius i finestres de trasplantament</h2>' +

            '<span>Cultiu</span><span>Protegida</span><span>Exterior</span><span>Finestra</span>' +

          '<h2>Com funciona</h2>' +
          '<p style="color:var(--c-ink-2);line-height:1.6">' +
            '<strong>Dies des de la darrera glaçada</strong> és el temps mínim que ha de passar perquè el cultiu ' +
            'sobrevisqui a l\'exterior. Cada espècie té un llindar diferent: els tomàquets necessiten 75 dies ' +
            'sense glaçada (a 0°C), mentre que lescols i lespastanagues en necessiten menys.</p>' +

            '<strong>Finestra</strong> és el període entre quan pots plantar a l\'exterior ' +
            'i quan has de collir-ho tot abans que tornin les primeres gelades de tardor.</p>' +

  async function loadMeteo() {
    const cfg = JSON.parse(localStorage.getItem('meteo-cfg') || '{"lloc": "vic"}');
    const lloc = METEO_LLOCS[cfg.lloc] || METEO_LLOCS.vic;
    const el = document.getElementById('meteo-actual');
    if (!el) return; // no estem a la pàgina d'inici
    el.innerHTML = '<div class="meteo-widget">⏳ Carregant meteorologia de ' + lloc.nom + '…</div>';
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lloc.lat + '&longitude=' + lloc.lon +
        '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m' +
        '&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max' +
        '&timezone=Europe/Madrid&forecast_days=5';
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      const c = d.current;
      const conditio = WMO_CODES[c.weather_code] || '—';
      // Construir previsió
      let forecastHtml = '';
      for (let i = 0; i < 5; i++) {
        const dia = new Date(d.daily.time[i]);
        const wmo = d.daily.weather_code[i];
        const tmax = Math.round(d.daily.temperature_2m_max[i]);
        const tmin = Math.round(d.daily.temperature_2m_min[i]);
        const em = WMO_CODES[wmo] ? WMO_CODES[wmo].split(' ')[0] : '☁️';
        forecastHtml += '<div class="meteo-day"><span class="em">' + em + '</span>' +
          dia.toLocaleDateString('ca-ES', { weekday: 'short' }) + '<br>' +
          tmax + '°/' + tmin + '°</div>';
      }
      el.innerHTML =
        '<div class="meteo-widget">' +
          '<div style="display:flex;align-items:baseline;gap:10px">' +
            '<span class="meteo-temp">' + Math.round(c.temperature_2m) + '°C</span>' +
            '<span class="meteo-cond">' + conditio + '</span>' +
          '</div>' +
          '<div class="meteo-lloc">📍 ' + lloc.nom + ' · Humitat: ' + c.relative_humidity_2m + '% · Vent: ' + Math.round(c.wind_speed_10m) + ' km/h</div>' +
          '<div class="meteo-forecast">' + forecastHtml + '</div>' +
          '<div style="margin-top:8px"><select id="meteo-lloc" style="font-size:11px;padding:2px 6px;border-radius:3px;border:1px solid var(--c-line)">' +
            Object.entries(METEO_LLOCS).map(([k, v]) =>
              '<option value="' + k + '"' + (k === cfg.lloc ? ' selected' : '') + '>' + v.nom + '</option>'
            ).join('') +
          '</select></div>' +
        '</div>';
      // Handler canvi de lloc
      const sel = document.getElementById('meteo-lloc');
      if (sel) {
        sel.addEventListener('change', () => {
          cfg.lloc = sel.value;
          localStorage.setItem('meteo-cfg', JSON.stringify(cfg));
          loadMeteo();
        });
      }
    } catch (e) {
      el.innerHTML = '<div class="meteo-widget">⚠️ No s\'ha pogut carregar la meteorologia (' + e.message + ')</div>';
    }
  }

  function renderRotacions() {

      '<span class="sep">›</span>' +

    const parceles = JSON.parse(localStorage.getItem('rot-parceles') || '[]');

    // Si no n'hi ha, inicialitzar-les buides
    const total = config.files * config.cols;
    while (parceles.length < total) {
      parceles.push({ fila: Math.floor(parceles.length / config.cols), col: (parceles.length % config.cols), familia: '' });

        '</div>' +

        '<div class="checklist-section">' +

          '</p>' +
          '<ul style="color:var(--c-ink-2);line-height:1.6">' +

            '<li>🌱 Esgotament de nutrients específics</li>' +
            '<li>🌿 Al·lelopatia (toxines que excreten algunes plantes)</li>' +
          '</ul>' +
          '<p style="color:var(--c-ink-2);font-size:14px"><strong>Esquema clàssic de 4 anys</strong>: ' +
            '1) <span class="familia-color" style="background:#C0392B"></span>Fruita/Arrel → ' +
            '2) <span class="familia-color" style="background:#8E44AD"></span>Cols/Brassiques → ' +
            '3) <span class="familia-color" style="background:#5C7A3A"></span>Lleguminoses → ' +
            '4) <span class="familia-color" style="background:#D4A017"></span>Arrels/Bulbs + descans</p>' +
          '<p style="color:var(--c-ink-2);font-size:13px;margin-top:12px">Més info: ' +

            '<a href="#doc=guia-avancada-osona.md">guia-avancada-osona.md</a>' +
          '</p>' +
        '</div>' +
      '</div>';

    // Handlers
    $$('.rot-parcela select').forEach(sel => {
      sel.addEventListener('change', () => {
        const i = parseInt(sel.dataset.i);
        parceles[i].familia = sel.value;
        localStorage.setItem('rot-parceles', JSON.stringify(parceles));
        renderRotacions();
      });
    });

    $('#r-apply').addEventListener('click', () => {
      const files = parseInt($('#r-files').value) || 4;
      const cols = parseInt($('#r-cols').value) || 5;
      localStorage.setItem('rot-config', JSON.stringify({ files, cols }));
      // Reorganitzar parcel·les existents
      const old = parceles.slice();
      parceles.length = 0;
      for (let i = 0; i < files * cols; i++) {
        if (old[i]) {
          old[i].fila = Math.floor(i / cols);
          old[i].col = i % cols;
          parceles.push(old[i]);
        } else {
          parceles.push({ fila: Math.floor(i / cols), col: i % cols, familia: '' });
        }
      }
      localStorage.setItem('rot-parceles', JSON.stringify(parceles));
      renderRotacions();
    });

    $('#r-clear').addEventListener('click', () => {
      if (confirm('Esborrar totes les dades de rotacions?')) {
        localStorage.removeItem('rot-parceles');
        localStorage.removeItem('rot-config');
        renderRotacions();
      }
    });

  // Vista calendari de les entrades del quadern
  function renderCalendariQuadern() {
    document.title = 'Calendari d\'observacions · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<a href="#quadern">Quadern</a>' +
      '<span class="sep">›</span>' +
      '<span>Vista calendari</span>';

    const entrades = JSON.parse(localStorage.getItem('quadern-entries') || '[]');
    // Agrupar per dia
    const perDia = {};
    for (const e of entrades) {
      const dia = e.data || (e.ts ? new Date(e.ts).toISOString().slice(0, 10) : null);
      if (dia) {
        perDia[dia] = (perDia[dia] || 0) + 1;
      }
    }
    // Generar 12 mesos de l'any actual
    const avui = new Date();
    const anyActual = avui.getFullYear();
    let mesosHtml = '';
    const MESOS = ['Gener', 'Febrer', 'Març', 'Abril', 'Maig', 'Juny',
                   'Juliol', 'Agost', 'Setembre', 'Octubre', 'Novembre', 'Desembre'];
    for (let m = 0; m < 12; m++) {
      const primerDia = new Date(anyActual, m, 1);
      const ultimDia = new Date(anyActual, m + 1, 0);
      // Diumenge = 0, Dilluns = 1
      const startOffset = (primerDia.getDay() + 6) % 7;  // ajustar a dilluns
      const dies = ultimDia.getDate();
      let diesHtml = '';
      // Dies buits abans
      for (let i = 0; i < startOffset; i++) {
        diesHtml += '<div class="cal-day empty"></div>';
      }
      for (let d = 1; d <= dies; d++) {
        const ymd = anyActual + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        const n = perDia[ymd] || 0;
        const isAvui = ymd === avui.toISOString().slice(0, 10);
        diesHtml += '<div class="cal-day' + (n > 0 ? ' te' : '') + (isAvui ? ' avui' : '') + '"' +
          (n > 0 ? ' title="' + ymd + ': ' + n + ' entrada' + (n > 1 ? 's' : '') + '"' : '') + '>' +
          '<span class="cal-n">' + d + '</span>' +
          (n > 0 ? '<span class="cal-dot">' + n + '</span>' : '') +
        '</div>';
      }
      mesosHtml += '<div class="cal-mes">' +
        '<h3>' + MESOS[m] + ' ' + anyActual + '</h3>' +
        '<div class="cal-dies-cap">' +
          '<span>Dl</span><span>Dt</span><span>Dc</span><span>Dj</span><span>Dv</span><span>Ds</span><span>Dg</span>' +
        '</div>' +
        '<div class="cal-dies">' + diesHtml + '</div>' +
      '</div>';
    }
    const total = entrades.length;
    const diesDiferents = Object.keys(perDia).length;
    const view = $('#view');
    view.className = 'checklist-page';
    view.innerHTML =
      '<div class="checklist-page-inner">' +
        '<h1>📅 Calendari d\'observacions</h1>' +
        '<p class="clima-note">Vista anual de les entrades del <a href="#quadern">quadern d\'observació</a>. Els dies marcats amb un punt vermell tenen observacions registrades.</p>' +
        '<div class="stats-resum">' +
          '<div class="stats-resum-card"><div class="gran">' + total + '</div><div class="lbl">Entrades totals</div></div>' +
          '<div class="stats-resum-card"><div class="gran">' + diesDiferents + '</div><div class="lbl">Dies diferents</div></div>' +
          '<div class="stats-resum-card"><div class="gran">' + (diesDiferents > 0 ? Math.round(total / diesDiferents * 10) / 10 : 0) + '</div><div class="lbl">Mitjana entrades/dia</div></div>' +
        '</div>' +
        '<div class="cal-grid">' + mesosHtml + '</div>' +
        '<p style="color:var(--c-ink-2);font-size:12.5px;margin-top:14px">' +
          '<strong>Llegenda:</strong> ' +
          '<span class="cal-day" style="display:inline-block;width:18px;height:18px;vertical-align:middle;border-radius:3px;background:var(--c-paper);border:1px solid var(--c-line)"></span> sense entrades · ' +
          '<span class="cal-day te" style="display:inline-block;width:18px;height:18px;vertical-align:middle;border-radius:3px;background:var(--c-ochre);border:1px solid var(--c-ochre)"></span> amb entrades · ' +
          '<span class="cal-day avui" style="display:inline-block;width:18px;height:18px;vertical-align:middle;border-radius:3px;background:var(--c-leaf);border:1px solid var(--c-leaf);color:white"></span> avui' +
        '</p>' +
      '</div>';
  }

  function renderQuadern() {
    document.title = 'Quadern d\'observació · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<span>Quadern d\'observació</span>';

    const avui = new Date().toISOString().slice(0, 10);
    const entries = JSON.parse(localStorage.getItem('quadern-entries') || '[]');

    let entriesHtml = '';
    if (entries.length === 0) {
      entriesHtml = '<div class="quadern-empty">Encara no hi ha cap entrada. Comença afegint-ne una a dalt.</div>';
    } else {
      // Ordenar de més recent a més antic
      const sorted = entries.slice().sort((a, b) => b.data.localeCompare(a.data));
      for (const e of sorted) {
        const meteo = [];
        if (e.tmax) meteo.push('🌡️ ' + e.tmax + '°/' + e.tmin + '°');
        if (e.pluja) meteo.push('🌧️ ' + e.pluja + 'mm');
        if (e.sol) meteo.push('☀️ ' + e.sol + ' dies sol');
        if (e.gelada) meteo.push('❄️ gelada');
        const meteoStr = meteo.length ? meteo.join(' · ') : '—';
        entriesHtml +=
          '<div class="quadern-entry">' +
            '<button class="del" data-del="' + e.id + '" title="Esborrar">×</button>' +
            '<div class="data">' + e.data + (e.cultiu ? ' · ' + escapeHtml(e.cultiu) : '') + '</div>' +
            '<div class="meteo">' + meteoStr + '</div>' +
            '<div class="notes">' + escapeHtml(e.notes || '') + '</div>' +
          '</div>';
      }
    }

    const view = $('#view');
    view.className = 'checklist-page';
    view.innerHTML =
      '<div class="checklist-page-inner">' +
        '<h1>📓 Quadern d\'observació</h1>' +
        '<p class="clima-note">Anota cada setmana el que observes a l\'hort. ' +
        'Les dades es desen al navegador (localStorage) i pots exportar-les a Markdown per incorporar-les al projecte.</p>' +
        '<div class="checklist-section">' +
          '<h2>Nova entrada</h2>' +
          '<div class="quadern-form">' +
            '<label>Data <input type="date" id="q-data" value="' + avui + '"></label>' +
            '<label>Cultiu (opcional) <input type="text" id="q-cultiu" placeholder="Ex: tomaqueres, mongetes…"></label>' +
            '<label>Temp. màx (°C) <input type="number" id="q-tmax" step="0.1"></label>' +
            '<label>Temp. mín (°C) <input type="number" id="q-tmin" step="0.1"></label>' +
            '<label>Pluja (mm) <input type="number" id="q-pluja" step="0.1"></label>' +
            '<label>Dies de sol <input type="number" id="q-sol" min="0" max="7"></label>' +
            '<label class="full" style="flex-direction:row;align-items:center;gap:6px"><input type="checkbox" id="q-gelada"> Hi ha hagut gelada aquesta setmana</label>' +
            '<label class="full">Notes / observacions / accions <textarea id="q-notes" placeholder="Ex: primera flor de tomàquet, Tuta activa, reg abundant, etc."></textarea></label>' +
          '</div>' +
          '<div class="quadern-actions">' +
            '<button class="copy-btn" id="q-add">💾 Afegir entrada</button>' +
            '<button class="copy-btn" id="q-export" style="background:var(--c-ochre)">📥 Exportar a Markdown</button>' +
            '<button class="copy-btn" id="q-clear" style="background:var(--c-red)">🗑️ Esborrar tot</button>' +
          '</div>' +
        '</div>' +
        '<div class="checklist-section">' +
          '<h2>Entrades (<span id="q-count">' + entries.length + '</span>)</h2>' +
          '<div class="quadern-entries" id="q-list">' + entriesHtml + '</div>' +
        '</div>' +
      '</div>';

    // Handlers
    $('#q-add').addEventListener('click', () => {
      const data = $('#q-data').value;
      const cultiu = $('#q-cultiu').value.trim();
      const tmax = $('#q-tmax').value;
      const tmin = $('#q-tmin').value;
      const pluja = $('#q-pluja').value;
      const sol = $('#q-sol').value;
      const gelada = $('#q-gelada').checked;
      const notes = $('#q-notes').value.trim();
      if (!data) { alert('Cal una data'); return; }
      if (!notes && !tmax && !pluja) { alert('Afegeix almenys una nota o una dada meteorològica'); return; }
      const entry = {
        id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
        data, cultiu, tmax, tmin, pluja, sol, gelada, notes,
        ts: new Date().toISOString()
      };
      const all = JSON.parse(localStorage.getItem('quadern-entries') || '[]');
      all.push(entry);
      localStorage.setItem('quadern-entries', JSON.stringify(all));
      renderQuadern(); // re-render
    });

    $('#q-export').addEventListener('click', () => {
      const all = JSON.parse(localStorage.getItem('quadern-entries') || '[]');
      if (!all.length) { alert('No hi ha entrades per exportar'); return; }
      const md = ['# Quadern d\'observació — Hort Osona', '', '_Exportat el ' + new Date().toISOString().slice(0, 10) + '_', ''];
      const sorted = all.slice().sort((a, b) => a.data.localeCompare(b.data));
      let currentMonth = '';
      for (const e of sorted) {
        const mes = e.data.slice(0, 7);
        if (mes !== currentMonth) {
          md.push('## ' + mes, '');
          currentMonth = mes;
        }
        md.push('### ' + e.data + (e.cultiu ? ' — ' + e.cultiu : ''));
        const meteo = [];
        if (e.tmax) meteo.push('Temp: ' + e.tmax + '°/' + e.tmin + '°');
        if (e.pluja) meteo.push('Pluja: ' + e.pluja + 'mm');
        if (e.sol) meteo.push('Sol: ' + e.sol + ' dies');
        if (e.gelada) meteo.push('⚠️ Gelada');
        if (meteo.length) md.push('*' + meteo.join(' · ') + '*');
        if (e.notes) md.push('', e.notes);
        md.push('');
      }
      const blob = new Blob([md.join('\n')], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'quadern-' + new Date().toISOString().slice(0, 10) + '.md';
      a.click();
      URL.revokeObjectURL(url);
    });

    $('#q-clear').addEventListener('click', () => {
      if (confirm('Segur que vols esborrar totes les entrades? Aquesta acció no es pot desfer.')) {
        localStorage.removeItem('quadern-entries');
        renderQuadern();
      }
    });

    // Esborrar individualment
    $$('.quadern-entry .del').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('Esborrar aquesta entrada?')) return;
        const id = btn.dataset.del;
        const all = JSON.parse(localStorage.getItem('quadern-entries') || '[]').filter(e => e.id !== id);
        localStorage.setItem('quadern-entries', JSON.stringify(all));
        renderQuadern();
      });
    });
  }

  // Genera un .ics per a totes les tasques del mes actual
  function generarICS() {
    if (!CHECKLIST) return;
    const tasques = (typeof allTasques !== 'undefined') ? allTasques : CHECKLIST.tasques;
    if (!tasques || !tasques.length) {
      alert('No hi ha tasques per exportar');
      return;
    }
    const MESOS = ['Gener', 'Febrer', 'Març', 'Abril', 'Maig', 'Juny',
                   'Juliol', 'Agost', 'Setembre', 'Octubre', 'Novembre', 'Desembre'];
    const year = CHECKLIST.year;
    const month = CHECKLIST.month;
    const setmanes = CHECKLIST.setmanes || [];
    // Per a cada tasca, assignem una setmana i generem un esdeveniment
    let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Hort Osona//Checklist//CAT\r\n';
    ics += 'CALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
    ics += 'X-WR-CALNAME:Hort Osona — ' + (MESOS[month-1] || '') + ' ' + year + '\r\n';
    ics += 'X-WR-CALDESC:Checklist mensual de l\'hort d\'Osona\r\n';
    let i = 0;
    for (const t of tasques) {
      // Assignar a una setmana del mes (distribució rotativa)
      const sw = setmanes[i % setmanes.length] || setmanes[0];
      if (!sw) continue;
      const dataYMD = sw.inici || sw[0];
      const dataFinYMD = sw.fi || sw[1];
      const dtstart = dataYMD.replace(/-/g, '') + 'T090000';
      const dtend = dataFinYMD.replace(/-/g, '') + 'T180000';
      const dtstamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
      const uid = 'hortosona-' + year + month + '-' + i + '@hortosona.local';
      const p = t.prio >= 5 ? 'URGENT' : (t.prio >= 4 ? 'IMPORTANT' : '');
      const summary = (p ? '[' + p + '] ' : '') + t.titol;
      ics += 'BEGIN:VEVENT\r\n';
      ics += 'UID:' + uid + '\r\n';
      ics += 'DTSTAMP:' + dtstamp + '\r\n';
      ics += 'DTSTART;VALUE=DATE:' + dataYMD.replace(/-/g, '') + '\r\n';
      ics += 'DTEND;VALUE=DATE:' + (new Date(new Date(dataFinYMD).getTime() + 86400000)).toISOString().slice(0, 10).replace(/-/g, '') + '\r\n';
      ics += 'SUMMARY:' + summary.replace(/[\\,;]/g, '\\$&') + '\r\n';
      ics += 'DESCRIPTION:' + (t.desc || '').replace(/[\\,;]/g, '\\$&') + '\r\n';
      ics += 'CATEGORIES:Hort,' + (t.cat || 'conreu') + '\r\n';
      ics += 'PRIORITY:' + (10 - (t.prio || 3) * 2) + '\r\n';  // ICS: 1-9, 1=high
      ics += 'END:VEVENT\r\n';
      i++;
    }
    ics += 'END:VCALENDAR\r\n';
    // Descarregar
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hort-osona-' + year + '-' + String(month).padStart(2, '0') + '.ics';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

            '<button class="copy-btn" id="export-pdf" style="background:var(--c-mud)">🖨 Imprimir / PDF</button>' +
          '</div>' +
          '<pre class="prompt-box" id="prompt-box">' + escapeHtml(promptText) + '</pre>' +
        '</div>' +
      '</div>';

    // Handlers per a tasques personalitzades
    const $tots = $('#c-tots');
    const $mesos = $('#c-mesos');
    if ($tots && $mesos) {
      $tots.addEventListener('change', () => {
        $mesos.style.display = $tots.checked ? 'none' : 'flex';
      });
    }
    const btnAdd = $('#c-add');
    if (btnAdd) {
      btnAdd.addEventListener('click', () => {
        const titol = $('#c-titol').value.trim();
        const desc = $('#c-desc').value.trim();
        if (!titol) { alert('Cal un títol'); return; }
        const cat = $('#c-cat').value;
        const prio = parseInt($('#c-prio').value) || 3;
        const totes = $tots.checked;
        let mesos = null;
        if (!totes) {
          mesos = $$('#c-mesos input:checked').map(cb => parseInt(cb.value));
          if (!mesos.length) { alert('Selecciona almenys un mes o marca "Tots els mesos"'); return; }
        }
        const all = JSON.parse(localStorage.getItem('checklist-custom') || '[]');
        all.push({ titol, cat, prio, desc, mesos, id: Date.now() + '-' + Math.random().toString(36).slice(2, 7) });
        localStorage.setItem('checklist-custom', JSON.stringify(all));
        alert('✅ Tasca afegida: ' + titol);
        renderChecklist();
      });
    }
    const btnShow = $('#c-show');
    if (btnShow) {
      btnShow.addEventListener('click', () => {
        const all = JSON.parse(localStorage.getItem('checklist-custom') || '[]');
        if (!all.length) { alert('No tens tasques personalitzades'); return; }
        let txt = 'Les teves tasques personalitzades (' + all.length + '):\n\n';
        for (const t of all) {
          const p = t.prio >= 5 ? '🔴' : (t.prio >= 4 ? '🟠' : '🟡');
          const mesos = t.mesos ? t.mesos.join(', ') : 'tots';
          txt += p + ' [' + t.cat + '] ' + t.titol + ' (mesos: ' + mesos + ')\n';
          if (t.desc) txt += '   ' + t.desc + '\n';
          txt += '\n';
        }
        txt += '\n---\nVols esborrar-les totes? Tanca això i prem "Esborrar" dins de "Veure totes les meves".';
        alert(txt);
      });
    }

    // Handler per exportar PDF (via print)
    const btnPdf = $('#export-pdf');
    if (btnPdf) {
      btnPdf.addEventListener('click', () => {
        document.body.classList.add('print-mode');
        window.print();
        setTimeout(() => document.body.classList.remove('print-mode'), 500);
      });
    }

    // Handler per activar recordatoris
    const btnRecordatoris = $('#activar-recordatoris');
    if (btnRecordatoris) {
      btnRecordatoris.addEventListener('click', async () => {
        const ok = await demanarPermisNotificacions();
        if (!ok) {
          alert('No s\'han pogut activar les notificacions. Comprova els permisos del navegador.');
          return;
        }
        // Programar recordatori diari a les 8:00 del matí
        const avui = new Date();
        const proper = new Date(avui.getFullYear(), avui.getMonth(), avui.getDate(), 8, 0, 0);
        if (proper <= avui) proper.setDate(proper.getDate() + 1);
        const ms = proper.getTime() - avui.getTime();
        setTimeout(() => {
          mostrarNotificacio('🌱 Bon dia! Tens tasques a l\'hort?', 'Obre la PWA per veure el checklist d\'avui');
          // Re-programar per demà
          setInterval(() => {
            mostrarNotificacio('🌱 Bon dia! Tens tasques a l\'hort?', 'Obre la PWA per veure el checklist d\'avui');
          }, 24 * 3600 * 1000);
        }, ms);
        btnRecordatoris.textContent = '✅ Recordatoris actius (8:00 cada dia)';
        btnRecordatoris.disabled = true;
        btnRecordatoris.style.opacity = '0.7';
        localStorage.setItem('recordatoris-actius', '1');
      });
      // Si ja estan actius, mostrar-ho
      if (localStorage.getItem('recordatoris-actius')) {
        btnRecordatoris.textContent = '✅ Recordatoris actius (8:00 cada dia)';
        btnRecordatoris.disabled = true;
        btnRecordatoris.style.opacity = '0.7';
      }
    }

    // Handler per exportar ICS
    const btnIcs = $('#export-ics');
    if (btnIcs) {
      btnIcs.addEventListener('click', () => {
        generarICS();
      });
    }

    // Handler per copiar
    const btn = $('#copy-prompt');
    if (btn) {
      btn.addEventListener('click', () => {
        const text = $('#prompt-box').textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = '✅ Copiat!';
          setTimeout(() => btn.textContent = '📋 Copiar prompt', 2000);
        });
      });
    }

    // Persistència dels checkboxes (localStorage)
    $$('.task-list input[type="checkbox"]').forEach(cb => {
      const key = 'checklist-' + CHECKLIST.year + '-' + CHECKLIST.month + '-' + cb.dataset.task;
      if (localStorage.getItem(key) === '1') {
        cb.checked = true;
        cb.parentElement.parentElement.classList.add('done');
      }
      cb.addEventListener('change', () => {
        if (cb.checked) {
          localStorage.setItem(key, '1');
          cb.parentElement.parentElement.classList.add('done');
        } else {
          localStorage.removeItem(key);
          cb.parentElement.parentElement.classList.remove('done');
        }
      });
    });
  }

  function focusCategory(name) {
    // 1) Tanca totes les categories i obre la que toca
    $$('.nav-cat').forEach(li => li.classList.add('collapsed'));
    const btn = $('.nav-cat-btn[data-cat="' + CSS.escape(name) + '"]');
    if (!btn) return;
    const li = btn.parentElement;
    li.classList.remove('collapsed');

    // 2) Neteja qualsevol "active" previ
    $$('.nav-item').forEach(a => a.classList.remove('active'));

    // 3) Marca visualment la categoria (no pas un document concret)
    $$('.nav-cat-btn').forEach(b => b.classList.remove('cat-focused'));
    btn.classList.add('cat-focused');

    // 4) Actualitza breadcrumb perquè sàpiga on és
    document.title = name + ' · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +
      '<span class="sep">›</span>' +
      '<span>' + escapeHtml(name) + '</span>';

    // 5) Scroll suau del sidebar fins al botó
    btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function renderSearchResults(q, tokens) {
    const results = searchDocs(q);
    document.title = (results ? results.length : 0) + ' resultats · Hort Osona';
    $('#crumbs').innerHTML =
      '<a href="#" data-home>🌱 Hort Osona</a>' +

        '<div class="welcome-card no-results">' +
          '<span class="em">🔍</span>' +
          '<h2 style="font-family:Fraunces,serif;color:var(--c-olive);margin:0 0 8px">Cap resultat</h2>' +

  function renderSidebar() {
    const nav = $('#nav');
    nav.innerHTML = '';
    SIDEBAR.forEach(s => {
      const docsInCat = DOCS.filter(d => d.category === s.name);
      const li = document.createElement('li');
      li.className = 'nav-cat';
      const btn = document.createElement('button');
      btn.className = 'nav-cat-btn';
      btn.dataset.cat = s.name;
      btn.innerHTML =
        '<span class="em">' + s.emoji + '</span>' +
        '<span>' + escapeHtml(s.name) + '</span>' +
        '<span class="ct">' + s.count + '</span>';
      btn.addEventListener('click', () => li.classList.toggle('collapsed'));
      li.appendChild(btn);

      const ul = document.createElement('ul');
      ul.className = 'nav-items';
      docsInCat.forEach(d => {
        const a = document.createElement('a');
        a.className = 'nav-item';
        a.href = '#doc=' + encodeURIComponent(d.id);
        a.dataset.id = d.id;
        a.textContent = d.title;
        ul.appendChild(a);
      });
      li.appendChild(ul);
      nav.appendChild(li);
    });
