<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Il·lustració d'un meló">
  <defs>
    <radialGradient id="melo-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5EBD8"/>
      <stop offset="100%" stop-color="#D9D0B5"/>
    </radialGradient>
    <linearGradient id="melo-skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A04F"/>
      <stop offset="50%" stop-color="#9C7A35"/>
      <stop offset="100%" stop-color="#6B5520"/>
    </linearGradient>
    <linearGradient id="melo-flesh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE4A0"/>
      <stop offset="100%" stop-color="#FFB84D"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#melo-bg)" rx="12"/>

  <!-- Fulla -->
  <g fill="#5C7A45" opacity="0.85">
    <ellipse cx="100" cy="50" rx="30" ry="15" transform="rotate(-20 100 50)"/>
    <ellipse cx="115" cy="60" rx="25" ry="12" transform="rotate(15 115 60)"/>
  </g>

  <!-- Tallo -->
  <rect x="98" y="60" width="4" height="20" fill="#5C7A45"/>

  <!-- Cos del meló -->
  <ellipse cx="100" cy="120" rx="60" ry="45" fill="url(#melo-skin)"/>

  <!-- Ratlles verticals del meló Piel de Sapo -->
  <g stroke="#6B5520" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 60 90 Q 60 120 70 155"/>
    <path d="M 80 85 Q 80 120 88 162"/>
    <path d="M 100 82 Q 100 120 100 165"/>
    <path d="M 120 85 Q 120 120 112 162"/>
    <path d="M 140 90 Q 140 120 130 155"/>
  </g>

  <!-- Brill -->
  <ellipse cx="80" cy="105" rx="8" ry="5" fill="#FFFCF3" opacity="0.4"/>

  <!-- Secció (tall de meló mostrant la carn) -->
  <g transform="translate(140, 130)">
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="url(#melo-flesh)" opacity="0.95"/>
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="#FFE4A0" opacity="0.6"/>
    <!-- Llavors -->
    <g fill="#8B5A2B">
      <ellipse cx="-4" cy="-2" rx="2" ry="1.5"/>
      <ellipse cx="3" cy="1" rx="2" ry="1.5"/>
      <ellipse cx="-1" cy="4" rx="2" ry="1.5"/>
    </g>
  </g>

  <text x="100" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3D4A2A" font-style="italic">Cucumis melo</text>
</svg>
