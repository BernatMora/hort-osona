<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5C7A3A"/>
      <stop offset="1" stop-color="#3D4A2A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="400" cy="120" r="40" fill="#F5EBD8" opacity="0.8"/>
  <!-- Soil -->
  <path d="M 50 380 Q 256 360 462 380 L 462 462 L 50 462 Z" fill="#6B4F2A"/>
  <!-- Plant stem -->
  <path d="M 256 380 L 256 220" stroke="#5C7A3A" stroke-width="14" stroke-linecap="round"/>
  <!-- Leaves left -->
  <path d="M 256 290 Q 200 270 160 240 Q 200 270 220 320 Q 240 305 256 290 Z" fill="#5C7A3A" stroke="#3D4A2A" stroke-width="3"/>
  <!-- Leaves right -->
  <path d="M 256 250 Q 320 230 360 200 Q 320 230 300 280 Q 280 265 256 250 Z" fill="#5C7A3A" stroke="#3D4A2A" stroke-width="3"/>
  <!-- Top leaf -->
  <path d="M 256 220 Q 230 180 240 130 Q 256 160 272 130 Q 282 180 256 220 Z" fill="#5C7A3A" stroke="#3D4A2A" stroke-width="3"/>
  <!-- Fruit (tomato) -->
  <circle cx="256" cy="200" r="32" fill="#A8783E" stroke="#3D4A2A" stroke-width="4"/>
  <ellipse cx="246" cy="190" rx="8" ry="6" fill="#F5EBD8" opacity="0.4"/>
  <!-- Water drop -->
  <path d="M 380 300 Q 380 320 380 340 Q 370 340 370 320 Q 370 300 380 300 Z" fill="#5BA3D0" opacity="0.7"/>
  <!-- Small dot for letter "h" effect -->
  <text x="256" y="450" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#F5EBD8" opacity="0.95">Hort Osona</text>
</svg>
